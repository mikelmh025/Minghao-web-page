<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>LLM Foundations — 39 Papers, Fast-Forward</title>
<link rel="preconnect" href="https://fonts.googleapis.com">
<link href="https://fonts.googleapis.com/css2?family=Inter:wght@400;500;600;700;800;900&family=JetBrains+Mono:wght@400;600&display=swap" rel="stylesheet">
<style>
:root{
  --cream:#faf9f5; --ink:#1f1e1b; --muted:#6b675f; --accent:#cc785c; --accent-dark:#a85b42;
  --accent-soft:#f3e2da; --card:#f1efe8; --line:#e2ded2; --code-bg:#ece9e0; --good:#2e7d4f;
  --bg:var(--cream); --fg:var(--ink); --shadow:0 18px 50px -18px rgba(31,30,27,.25);
  --lead-bg:radial-gradient(1200px 700px at 75% -10%, #3a382f 0%, #1f1e1b 55%);
}
html[data-theme="dark"]{
  --bg:#171613; --fg:#ece9df; --muted:#a49e90; --card:#22201b; --line:#33302a;
  --code-bg:#2a2822; --accent:#e08b6d; --accent-dark:#e8a58c; --accent-soft:#3a2c25;
  --shadow:0 18px 50px -18px rgba(0,0,0,.6);
  --lead-bg:radial-gradient(1200px 700px at 75% -10%, #262girl 0%, #111009 55%);
  --lead-bg:radial-gradient(1200px 700px at 75% -10%, #26241d 0%, #111009 55%);
}
*{box-sizing:border-box; margin:0}
html,body{height:100%}
body{
  background:var(--bg); color:var(--fg);
  font-family:"Inter",-apple-system,sans-serif;
  overflow:hidden; transition:background .35s,color .35s;
}
code{font-family:"JetBrains Mono",monospace; font-size:.86em; background:var(--code-bg);
  padding:.08em .38em; border-radius:5px}
strong{color:var(--accent-dark)}
a{color:var(--accent-dark)}

/* ---------- viz (validated palette: #2a78d6 #1baf7a #eda100 #4a3aa7) ---------- */
:root{--c1:#2a78d6; --c2:#1baf7a; --c3:#eda100; --c4:#4a3aa7; --grid:#e1e0d9; --axis:#c3c2b7}
html[data-theme="dark"]{--c1:#3987e5; --c2:#199e70; --c3:#c98500; --c4:#9085e9; --grid:#2c2c2a; --axis:#4a4a44}
.viz{margin:2px 0 18px; background:var(--card); border:1px solid var(--line); border-radius:14px; padding:12px 16px 8px}
.viz svg{width:100%; height:auto; display:block; max-height:240px}
.viz text,.demo text{font-family:"Inter",sans-serif; fill:var(--muted)}
.viz .lb,.demo .lb{font-size:11px; font-weight:600}
.viz .lb2,.demo .lb2{font-size:10px}
.viz .ink,.demo .ink{fill:var(--fg)}
.viz .mono,.demo .mono{font-family:"JetBrains Mono",monospace}

/* ---------- interactive demos ---------- */
.demo{margin-top:18px; border:1.5px solid var(--accent); border-radius:16px; padding:16px 20px 18px; background:transparent}
.demo .dhead{display:flex; align-items:center; gap:8px; margin-bottom:14px;
  font:800 11.5px "Inter"; letter-spacing:.1em; text-transform:uppercase; color:var(--accent-dark)}
.demo .dhead::before{content:"⚡"; font-size:14px}
.drow{display:flex; gap:18px; flex-wrap:wrap; align-items:flex-end; margin-bottom:4px}
.dctl{display:flex; flex-direction:column; gap:5px}
.dctl label{font:600 11px "Inter"; color:var(--muted); text-transform:uppercase; letter-spacing:.05em}
.dctl output{font:700 13px "JetBrains Mono"; color:var(--accent-dark)}
.dctl input[type=range]{accent-color:var(--accent); width:160px; cursor:pointer}
.dctl input[type=number],.dctl select{border:1px solid var(--line); background:var(--card); color:var(--fg);
  border-radius:8px; padding:6px 10px; font:600 13px "JetBrains Mono"; width:110px; outline:none}
.dctl select{width:auto; font-family:"Inter"; font-weight:600}
.dchecks{display:flex; gap:12px; flex-wrap:wrap; align-items:center}
.dchecks label{display:flex; gap:5px; align-items:center; font:600 12.5px "Inter"; color:var(--fg); cursor:pointer; text-transform:none; letter-spacing:0}
.dchecks input{accent-color:var(--accent)}
.dstats{display:flex; gap:12px; flex-wrap:wrap; margin-top:14px}
.dstat{background:var(--card); border:1px solid var(--line); border-radius:12px; padding:10px 16px; min-width:130px}
.dstat .v{font:700 19px "JetBrains Mono"; color:var(--accent-dark); line-height:1.2}
.dstat .k{font:600 10px "Inter"; color:var(--muted); text-transform:uppercase; letter-spacing:.06em; margin-top:3px}
.dnote{font:500 12.5px "Inter"; color:var(--muted); margin-top:12px; line-height:1.5}
.dbadge{display:inline-block; font:700 12px "Inter"; border-radius:999px; padding:4px 12px; margin-top:12px}
.dbadge.ok{background:rgba(12,163,12,.12); color:#0ca30c}
.dbadge.warn{background:rgba(208,59,59,.12); color:#d03b3b}
.dbar{display:flex; height:24px; border-radius:7px; overflow:hidden; gap:2px; margin-top:12px; background:var(--code-bg)}
.dbar>div{transition:width .25s}
.demo svg text{font-family:"Inter",sans-serif; fill:var(--muted); font-size:10px}

/* ---------- chrome ---------- */
#progress{position:fixed; top:0; left:0; height:3px; z-index:60;
  background:linear-gradient(90deg,var(--accent),var(--accent-dark)); width:0%;
  transition:width .35s cubic-bezier(.4,0,.2,1)}
#topbar{position:fixed; top:0; left:0; right:0; height:52px; z-index:50;
  display:flex; align-items:center; gap:10px; padding:0 18px; pointer-events:none}
#topbar>*{pointer-events:auto}
.brand{font-weight:800; font-size:13px; letter-spacing:.04em; color:var(--muted);
  text-transform:uppercase; user-select:none}
.brand b{color:var(--accent-dark)}
.spacer{flex:1}
.btn{border:1px solid var(--line); background:var(--card); color:var(--fg);
  border-radius:9px; padding:6px 11px; font:600 12.5px "Inter"; cursor:pointer;
  display:inline-flex; align-items:center; gap:6px; transition:all .18s}
.btn:hover{border-color:var(--accent); color:var(--accent-dark); transform:translateY(-1px)}
.btn kbd{font-family:"JetBrains Mono"; font-size:10px; background:var(--code-bg);
  border:1px solid var(--line); border-radius:4px; padding:1px 5px; color:var(--muted)}

/* ---------- stage ---------- */
#stage{position:absolute; inset:0; display:flex; align-items:center; justify-content:center}
.slide{
  position:absolute; width:min(1120px,94vw); max-height:calc(100vh - 120px);
  overflow-y:auto; scrollbar-width:thin; scrollbar-color:var(--line) transparent;
  padding:48px 58px; border-radius:22px;
  opacity:0; transform:translateX(60px) scale(.985); pointer-events:none;
  transition:opacity .45s cubic-bezier(.4,0,.2,1),transform .45s cubic-bezier(.4,0,.2,1);
}
.slide.active{opacity:1; transform:none; pointer-events:auto}
.slide.prev{transform:translateX(-60px) scale(.985)}
.slide.content{background:var(--bg)}
@media (prefers-reduced-motion:reduce){ .slide{transition:opacity .2s} .slide.prev,.slide{transform:none} }

/* paper slide */
.pno{display:inline-flex; align-items:center; gap:10px; margin-bottom:6px}
.pno .num{font:800 15px "JetBrains Mono"; color:#fff; background:var(--accent);
  border-radius:9px; padding:4px 11px; letter-spacing:.02em}
.pno .yr{font:600 13px "JetBrains Mono"; color:var(--muted)}
h1.ptitle{font-size:clamp(24px,3.1vw,36px); font-weight:800; letter-spacing:-.015em; line-height:1.12; margin-bottom:20px}
.cols{display:grid; grid-template-columns:1fr 1fr; gap:20px}
@media(max-width:900px){.cols{grid-template-columns:1fr}}
.panel{background:var(--card); border:1px solid var(--line); border-radius:16px; padding:20px 22px;
  transition:transform .2s, box-shadow .2s}
.panel:hover{transform:translateY(-2px); box-shadow:var(--shadow)}
.panel h3{font-size:11.5px; font-weight:800; letter-spacing:.09em; text-transform:uppercase;
  color:var(--accent-dark); margin-bottom:12px; display:flex; align-items:center; gap:8px}
.panel h3::before{content:""; width:8px; height:8px; border-radius:2px; background:var(--accent)}
.panel ul{list-style:none; display:flex; flex-direction:column; gap:10px}
.panel li{font-size:14.5px; line-height:1.52; padding-left:16px; position:relative; color:var(--fg)}
.panel li::before{content:""; position:absolute; left:0; top:.55em; width:6px; height:6px;
  border-radius:50%; background:var(--accent); opacity:.7}
.active .panel li{opacity:0; transform:translateY(8px); animation:rise .45s forwards}
@keyframes rise{to{opacity:1; transform:none}}
.tl{font-size:15.5px; color:var(--muted); font-style:italic; margin:-10px 0 20px}

.chiprow{display:flex; gap:8px; margin-top:20px; flex-wrap:wrap}
.chip{font:600 12px "JetBrains Mono"; color:var(--accent-dark); background:var(--card);
  border:1px solid var(--line); border-radius:999px; padding:5px 14px; text-decoration:none;
  transition:all .18s; display:inline-flex; align-items:center; gap:6px}
a.chip:hover{border-color:var(--accent); background:var(--accent-soft); transform:translateY(-1px)}
a.chip::after{content:"↗"; font-size:11px; opacity:.6}

/* lead slide */
.slide.lead{background:var(--lead-bg); color:#e9e5da; display:flex; flex-direction:column;
  justify-content:center; min-height:min(560px,70vh); box-shadow:var(--shadow)}
.slide.lead .kicker{font:700 13px "JetBrains Mono"; color:var(--accent); letter-spacing:.14em;
  text-transform:uppercase; margin-bottom:14px}
.slide.lead h1{font-size:clamp(32px,4.4vw,54px); font-weight:900; letter-spacing:-.02em;
  color:#f6f3ea; line-height:1.06; margin-bottom:14px}
.slide.lead h2{font-size:clamp(16px,1.9vw,22px); font-weight:600; color:var(--accent); margin-bottom:18px}
.slide.lead p{color:#b9b4a6; font-size:15.5px; line-height:1.6; max-width:720px}
.slide.lead .minis{display:flex; gap:8px; margin-top:26px; flex-wrap:wrap}
.mini{font:600 12px "Inter"; color:#d8d3c5; background:rgba(255,255,255,.07);
  border:1px solid rgba(255,255,255,.13); border-radius:999px; padding:6px 14px; cursor:pointer;
  transition:all .18s}
.mini:hover{background:var(--accent); color:#fff; border-color:var(--accent)}

/* generic content slide (how-to, map) */
.slide h1.gt{font-size:clamp(26px,3.2vw,38px); font-weight:800; letter-spacing:-.015em; margin-bottom:22px}
table.neat{width:100%; border-collapse:collapse; font-size:14.5px; margin:6px 0 16px}
table.neat th{text-align:left; font-size:11px; text-transform:uppercase; letter-spacing:.08em;
  color:var(--accent-dark); padding:8px 12px; border-bottom:2px solid var(--accent)}
table.neat td{padding:10px 12px; border-bottom:1px solid var(--line); line-height:1.5; vertical-align:top}
table.neat tr{transition:background .15s}
table.neat tbody tr:hover{background:var(--card)}
.callout{border-left:4px solid var(--accent); background:var(--card); border-radius:0 12px 12px 0;
  padding:14px 18px; font-size:14.5px; line-height:1.55; margin-top:14px}

/* reading map */
.mapchip{display:inline-block; font:700 12px "JetBrains Mono"; background:var(--card);
  border:1px solid var(--line); color:var(--accent-dark); border-radius:8px; padding:3px 9px;
  margin:2px; cursor:pointer; transition:all .15s}
.mapchip:hover{background:var(--accent); color:#fff; border-color:var(--accent); transform:scale(1.08)}
.maparrow{color:var(--muted); font-size:12px; margin:0 2px}

/* ---------- overview grid ---------- */
#overview{position:fixed; inset:0; z-index:70; background:var(--bg); overflow-y:auto;
  padding:70px 40px 40px; display:none}
#overview.open{display:block; animation:fadein .25s}
@keyframes fadein{from{opacity:0}to{opacity:1}}
#ovgrid{display:grid; grid-template-columns:repeat(auto-fill,minmax(210px,1fr)); gap:14px; max-width:1400px; margin:0 auto}
.ovcard{border:1px solid var(--line); background:var(--card); border-radius:14px; padding:14px 16px;
  cursor:pointer; transition:all .18s; min-height:92px; position:relative; overflow:hidden}
.ovcard:hover{transform:translateY(-3px); box-shadow:var(--shadow); border-color:var(--accent)}
.ovcard.now{border-color:var(--accent); box-shadow:0 0 0 2px var(--accent-soft)}
.ovcard .n{font:700 11px "JetBrains Mono"; color:var(--accent-dark)}
.ovcard .t{font:700 14px "Inter"; margin-top:4px; line-height:1.3}
.ovcard .s{font:500 11px "Inter"; color:var(--muted); margin-top:6px}
.ovcard.lead-card{background:var(--ink); border-color:#333}
.ovcard.lead-card .t{color:#f0ece1}
.ovsec{grid-column:1/-1; font:800 12px "Inter"; letter-spacing:.1em; text-transform:uppercase;
  color:var(--muted); margin-top:10px}

/* ---------- TOC sidebar ---------- */
#toc{position:fixed; top:0; bottom:0; left:0; width:320px; z-index:80; background:var(--bg);
  border-right:1px solid var(--line); transform:translateX(-100%); transition:transform .3s cubic-bezier(.4,0,.2,1);
  overflow-y:auto; padding:64px 0 30px; box-shadow:var(--shadow)}
#toc.open{transform:none}
#toc .sec{font:800 11px "Inter"; letter-spacing:.1em; text-transform:uppercase; color:var(--accent-dark);
  padding:16px 22px 6px}
#toc .item{display:flex; gap:10px; padding:7px 22px; font:500 13.5px "Inter"; cursor:pointer;
  color:var(--fg); border-left:3px solid transparent; transition:all .14s}
#toc .item:hover{background:var(--card)}
#toc .item.now{border-left-color:var(--accent); background:var(--card); font-weight:700}
#toc .item .n{font:600 11px "JetBrains Mono"; color:var(--muted); min-width:26px; padding-top:2px}

/* ---------- search ---------- */
#search{position:fixed; inset:0; z-index:90; background:rgba(20,19,16,.45); backdrop-filter:blur(6px);
  display:none; align-items:flex-start; justify-content:center; padding-top:12vh}
#search.open{display:flex; animation:fadein .18s}
#sbox{width:min(640px,92vw); background:var(--bg); border:1px solid var(--line); border-radius:18px;
  box-shadow:var(--shadow); overflow:hidden}
#sinput{width:100%; border:none; outline:none; background:transparent; color:var(--fg);
  font:500 17px "Inter"; padding:18px 22px; border-bottom:1px solid var(--line)}
#sresults{max-height:46vh; overflow-y:auto}
.sres{padding:12px 22px; cursor:pointer; display:flex; gap:12px; align-items:baseline}
.sres:hover,.sres.sel{background:var(--card)}
.sres .n{font:700 11px "JetBrains Mono"; color:var(--accent-dark); min-width:30px}
.sres .t{font:600 14px "Inter"}
.sres .x{font:400 12px "Inter"; color:var(--muted); margin-left:auto; white-space:nowrap}

/* ---------- footer nav ---------- */
#navbar{position:fixed; bottom:16px; left:0; right:0; display:flex; align-items:center;
  justify-content:center; gap:14px; z-index:50; pointer-events:none}
#navbar>*{pointer-events:auto}
.navbtn{width:42px; height:42px; border-radius:50%; border:1px solid var(--line); background:var(--card);
  color:var(--fg); font-size:17px; cursor:pointer; transition:all .18s; display:flex; align-items:center; justify-content:center}
.navbtn:hover{border-color:var(--accent); color:var(--accent-dark); transform:translateY(-2px)}
#counter{font:600 12.5px "JetBrains Mono"; color:var(--muted); min-width:70px; text-align:center; user-select:none}
#secname{position:fixed; bottom:26px; left:22px; font:600 11.5px "Inter"; letter-spacing:.06em;
  text-transform:uppercase; color:var(--muted); z-index:50; user-select:none; max-width:30vw;
  white-space:nowrap; overflow:hidden; text-overflow:ellipsis}

#help{position:fixed; inset:0; z-index:95; background:rgba(20,19,16,.45); backdrop-filter:blur(6px);
  display:none; align-items:center; justify-content:center}
#help.open{display:flex; animation:fadein .18s}
#helpbox{background:var(--bg); border:1px solid var(--line); border-radius:18px; padding:28px 34px; width:min(460px,90vw); box-shadow:var(--shadow)}
#helpbox h2{font-size:18px; margin-bottom:16px}
#helpbox .row{display:flex; justify-content:space-between; padding:7px 0; font-size:14px; border-bottom:1px solid var(--line)}
#helpbox kbd{font:600 11.5px "JetBrains Mono"; background:var(--code-bg); border:1px solid var(--line); border-radius:5px; padding:2px 8px}
</style>
</head>
<body>
<div id="progress"></div>
<div id="topbar">
  <span class="brand">LLM <b>Foundations</b> · 39 papers</span>
  <div class="spacer"></div>
  <button class="btn" id="b-toc">☰ Contents</button>
  <button class="btn" id="b-search">Search <kbd>/</kbd></button>
  <button class="btn" id="b-grid">Grid <kbd>G</kbd></button>
  <button class="btn" id="b-theme">◐</button>
  <button class="btn" id="b-help">?</button>
</div>

<div id="stage"></div>

<div id="navbar">
  <button class="navbtn" id="b-prev">←</button>
  <span id="counter">1 / 1</span>
  <button class="navbtn" id="b-next">→</button>
</div>
<div id="secname"></div>

<div id="overview"><div id="ovgrid"></div></div>
<div id="toc"></div>
<div id="search"><div id="sbox"><input id="sinput" placeholder="Search papers, concepts, methods…  (Enter to jump, Esc to close)"><div id="sresults"></div></div></div>
<div id="help"><div id="helpbox">
  <h2>Keyboard shortcuts</h2>
  <div class="row"><span>Next / previous slide</span><span><kbd>→</kbd> <kbd>←</kbd> <kbd>Space</kbd></span></div>
  <div class="row"><span>First / last slide</span><span><kbd>Home</kbd> <kbd>End</kbd></span></div>
  <div class="row"><span>Overview grid</span><span><kbd>G</kbd> or <kbd>Esc</kbd></span></div>
  <div class="row"><span>Search</span><span><kbd>/</kbd> or <kbd>⌘K</kbd></span></div>
  <div class="row"><span>Contents sidebar</span><span><kbd>T</kbd></span></div>
  <div class="row"><span>Dark / light</span><span><kbd>D</kbd></span></div>
  <div class="row"><span>This help</span><span><kbd>?</kbd></span></div>
</div></div>

<script>
/* ============================== DATA ============================== */
const P = (no,title,year,arxiv,paper,practice,tl)=>({type:'paper',no,title,year,arxiv,paper,practice,tl});

const SECTIONS = [
{title:"§1 · The architecture era", sub:"1–4 — Transformer · BERT · GPT-1 · GPT-2", slides:[
P(1,"Attention Is All You Need",2017,"1706.03762",
["<strong>Three</strong> attention uses: encoder self / decoder <em>causal</em> / cross — only causal survives in LLMs",
"Forgotten knobs that mattered: label smoothing 0.1, warmup→inv-sqrt LR, beam α=0.6, checkpoint averaging",
"The complexity table O(n²·d) vs O(n·d²) → origin of the entire efficiency literature (#18–25)"],
["Nobody runs it verbatim — surviving stack: decoder-only, <strong>pre</strong>-norm RMSNorm, SwiGLU, RoPE, no biases",
"FFN ≈ 2/3 of params → why MoE targets the FFN; attention → why the KV cache exists"],
"Pure-attention encoder-decoder; scaled dot-product + multi-head; sinusoidal positions."),
P(2,"BERT",2018,"1810.04805",
["80/10/10 masking exists to fix the pretrain–finetune mismatch ([MASK] never appears downstream)",
"Fine-tuning vs <strong>feature extraction</strong> compared (concat last 4 layers ≈ close) — ancestor of the embeddings industry",
"NSP presented as key; RoBERTa later showed it useless-to-harmful"],
["Encoders thrive at scale: retrieval bi-encoders, rerankers, classification, moderation",
"Build with DeBERTa-v3 / ModernBERT (RoPE, FA2, 8K ctx); mean pooling > [CLS] for similarity"],
"Bidirectional encoder pre-trained with masked LM + next-sentence prediction; fine-tune per task."),
P(3,"GPT-1 — Generative Pre-Training",2018,null,
["<strong>Input transformations</strong> — serializing tasks into delimiter-joined sequences → ancestor of prompt formats & chat templates",
"Auxiliary LM loss (λ=0.5) during fine-tuning — early catastrophic-forgetting control",
"§5 zero-shot probing: task ability grows during <em>pre-training</em> — the seed of GPT-2/3"],
["Read for lineage. Living legacy: task formatting is a modeling decision — chat-template sensitivity still skews evals today"],
"Decoder-only LM pre-training on BooksCorpus, then supervised fine-tuning per task."),
P(4,"GPT-2 — Unsupervised Multitask Learners",2019,null,
["WebText's Reddit-karma filter = first <em>human-signal</em> data quality filter — data curation as capability lever starts here",
"<strong>Byte-level BPE</strong>: the tokenizer outlived the model by half a decade",
"Memorization analysis + staged release — first serious misuse-risk treatment"],
["Model-based quality classifiers (FineWeb-Edu) are direct descendants",
"GPT-2 scale = today's research substrate: speedruns, interpretability, optimizer ablations (#37)"],
"1.5B decoder-only on 40GB of quality-filtered web text; tasks emerge zero-shot."),
]},
{title:"§2 · The scaling era", sub:"5–9 — Scaling Laws · GPT-3 · The Pile · Chinchilla · PaLM", slides:[
P(5,"Scaling Laws for Neural LMs",2020,"2001.08361",
["Depth/width shape barely matters at fixed N; bigger models are <strong>more sample-efficient</strong>",
"Critical batch size scales with loss → basis of batch-ramp schedules",
"The flawed prescription (N ∝ C^0.73, “stop early”) — cause: LR schedule not retuned per run length"],
["The <em>methodology</em> is the asset: fit small runs, extrapolate, then commit compute (+ µP transfer)",
"Use Chinchilla's coefficients; keep Kaplan's sample-efficiency intuition for fine-tuning"],
"Loss is a power law in params, data, compute; scale beats architecture tweaks."),
P(6,"GPT-3 — Few-Shot Learners",2020,"2005.14165",
["The contamination appendix: they found their own dedup bug and published clean/dirty splits — still the reference method",
"Alternating dense / banded-sparse attention layers (almost never replicated)",
"Honest failure catalog: bidirectional-ish tasks, 5-digit arithmetic, broader impacts"],
["Few-shot = the floor; known pathologies: example-order, format, majority-label bias",
"The escalation ladder it started: prompt → few-shot → RAG → LoRA → full FT",
"300B tokens on 175B params = the canonical <em>undertrained</em> model (see #8)"],
"175B params; zero/one/few-shot in-context learning replaces fine-tuning."),
P(7,"The Pile",2020,"2101.00027",
["22 documented sources with datasheet, consent status, known issues — template for every data card since",
"The Pile as <em>benchmark</em>: per-component perplexity reveals what a model has seen",
"Mixture weights (epochs per source) as an explicit design lever"],
["Superseded (FineWeb, Dolma); lesson inverted: <strong>filtered web > raw diversity</strong> per token — but domain coverage (code, math) still sets capability profiles",
"Books3 litigation → corpus provenance is now legal due-diligence, not just science"],

const UPDF = {
s1(){
  const w=+$('s1-w').value;
  $('s1-wo').textContent=w+' × Wait';
  const ACC=[40,46,50,53.5,55.5,56.5,56.8], TOK=[1.6,2.6,3.7,4.9,6.2,7.6,9.1];
  $('s1-acc').textContent=ACC[w].toFixed(1)+'%';
  $('s1-tok').textContent='≈ '+TOK[w].toFixed(1)+'K';
  const X=i=>24+i*49, Y=a=>104-(a-38)/20*88;
  let s='<polyline points="'+ACC.map((a,i)=>X(i)+','+Y(a)).join(' ')+'" fill="none" stroke="var(--accent)" stroke-width="2"/>';
  ACC.forEach((a,i)=>{s+='<circle cx="'+X(i)+'" cy="'+Y(a)+'" r="'+(i===w?6:3.5)+'" fill="var(--accent)" '+(i===w?'stroke="var(--bg)" stroke-width="2"':'opacity=".5"')+'/>';});
  s+='<text x="24" y="118" style="font:600 9px Inter" fill="var(--muted)">0 Waits</text><text x="318" y="118" text-anchor="end" style="font:600 9px Inter" fill="var(--muted)">6</text>';
  $('s1-svg').innerHTML=s;
  const b=$('s1-badge');
  if(w<=1){b.textContent='cheap gains — the model was stopping too early'; b.className='dbadge ok';}
  else if(w<=4){b.textContent='✓ the productive zone — each Wait still buys accuracy'; b.className='dbadge ok';}
  else{b.textContent='saturated — the 6th Wait buys ~nothing; naive extension has a ceiling'; b.className='dbadge warn';}
},
gqa(){
  const L=+$('gq-l').value, q=+$('gq-q').value, kv=Math.pow(2,+$('gq-kv').value), d=+$('gq-d').value, t=+$('gq-t').value;
  $('gq-kvo').textContent='n_kv = '+kv;
  const per=2*L*kv*d*t, mha=2*L*q*d*t;
  $('gq-tok').textContent=per>=1048576?(per/1048576).toFixed(2)+' MB':(per/1024).toFixed(0)+' KB';
  $('gq-128').textContent=(per*131072/1e9).toFixed(1)+' GB';
  $('gq-vs').textContent='×1/'+(mha/per).toFixed(0);
  const b=$('gq-badge');
  if(kv>=q){b.textContent='MHA — maximum quality, maximum cache'; b.className='dbadge warn';}
  else if(kv===1){b.textContent='MQA — maximum shrink; quality gap is why GQA won'; b.className='dbadge warn';}
  else{b.textContent='✓ GQA-'+kv+(kv===8?' — the industry knee (Llama 2/3, Mistral, Qwen)':''); b.className='dbadge ok';}
},
rope(){
  const m=+$('ro-m').value, dl=+$('ro-d').value, th=0.28, aq=0.5, ak=1.15;
  $('ro-mo').textContent='m = '+m; $('ro-do').textContent='Δ = '+dl;
  const qa=aq+m*th, ka=ak+(m-dl)*th, r=48, cx=65, cy=65;
  const P=a=>[cx+r*Math.cos(-a), cy+r*Math.sin(-a)];
  const [qx,qy]=P(qa), [kx,ky]=P(ka);
  const dot=Math.cos(qa-ka);
  $('ro-dot').textContent=dot.toFixed(3);
  $('ro-circle').innerHTML=
   `<circle cx="${cx}" cy="${cy}" r="${r}" fill="none" stroke="var(--line)"/>
    <line x1="${cx}" y1="${cy}" x2="${qx}" y2="${qy}" stroke="var(--accent)" stroke-width="2.5"/>
    <circle cx="${qx}" cy="${qy}" r="4" fill="var(--accent)"/><text x="${cx+(qx-cx)*1.22-4}" y="${cy+(qy-cy)*1.22+4}" style="font:700 10px Inter" fill="var(--accent-dark)">q</text>
    <line x1="${cx}" y1="${cy}" x2="${kx}" y2="${ky}" stroke="var(--c1)" stroke-width="2.5"/>
    <circle cx="${kx}" cy="${ky}" r="4" fill="var(--c1)"/><text x="${cx+(kx-cx)*1.22-4}" y="${cy+(ky-cy)*1.22+4}" style="font:700 10px Inter" fill="var(--c1)">k</text>`;
},
chin(){
  const C=Math.pow(10,+$('ch-c').value);
  $('ch-co').textContent='10^'+(+$('ch-c').value).toFixed(2)+' ≈ '+fnum(C)+' FLOPs';
  const N=Math.sqrt(C/120), D=20*N;
  $('ch-nopt').textContent=fnum(N); $('ch-dopt').textContent=fnum(D)+' tok';
  const yrs=C/(989e12*0.4)/3.156e7;
  $('ch-gpu').textContent=yrs<1?(yrs*365).toFixed(1)+' d':fnum(yrs)+' y';
  const n=+$('ch-n').value*1e9, d=+$('ch-d').value*1e12, r=d/n;
  $('ch-ratio').textContent=Math.round(r).toLocaleString();
  const b=$('ch-badge');
  if(r<20){b.textContent='undertrained — below the 20 tok/param floor (the GPT-3 mistake)'; b.className='dbadge warn';}
  else{b.textContent='≥20 ✓ — '+(r>60?'deliberately overtrained: buying inference efficiency with training compute':'near Chinchilla-optimal for training compute'); b.className='dbadge ok';}
},
lora(){
  const r=+$('lo-r').value; $('lo-ro').textContent='r = '+r;
  const mats=[]; const d=4096, dff=14336, kv=1024, L=32;
  if($('lo-q').checked)mats.push([d,d]); if($('lo-k').checked)mats.push([d,kv]);
  if($('lo-v').checked)mats.push([d,kv]); if($('lo-o').checked)mats.push([d,d]);
  if($('lo-g').checked){mats.push([d,dff]);mats.push([d,dff]);} if($('lo-dn').checked)mats.push([dff,d]);
  const tr=mats.reduce((s,m)=>s+r*(m[0]+m[1]),0)*L;
  $('lo-tr').textContent=fnum(tr);
  $('lo-pct').textContent=(tr/8.03e9*100).toFixed(3)+'%';
  $('lo-mb').textContent=(tr*2/1048576).toFixed(1)+' MB';
},
spec(){
  const a=+$('sp-a').value, g=+$('sp-g').value, c=+$('sp-c').value;
  $('sp-ao').textContent='α = '+a.toFixed(2); $('sp-go').textContent='γ = '+g; $('sp-co').textContent='c = '+c.toFixed(2);
  const E=x=>(1-Math.pow(a,x+1))/(1-a), S=x=>E(x)/(c*x+1);
  $('sp-e').textContent=E(g).toFixed(2)+' tok';
  $('sp-s').textContent=S(g).toFixed(2)+'×';
  let best=1,bs=0; for(let x=1;x<=12;x++){if(S(x)>bs){bs=S(x);best=x;}}
  $('sp-opt').textContent='γ* = '+best+' ('+bs.toFixed(2)+'×)';
  const pts=[]; let mx=0; for(let x=1;x<=10;x++){mx=Math.max(mx,S(x));}
  for(let x=1;x<=10;x++){pts.push((20+(x-1)*40)+','+(62-S(x)/mx*48));}
  $('sp-curve').innerHTML='<polyline points="'+pts.join(' ')+'" fill="none" stroke="var(--accent)" stroke-width="2"/>'+
    '<circle cx="'+(20+(g-1)*40)+'" cy="'+(62-S(g)/mx*48)+'" r="5" fill="var(--accent)" stroke="var(--bg)" stroke-width="2"/>'+
    '<text x="20" y="72" class="lb2">γ=1</text><text x="380" y="72" text-anchor="end" class="lb2">γ=10</text><text x="200" y="12" text-anchor="middle" class="lb2">speedup vs γ</text>';
}
};
const $=id=>document.getElementById(id);
function fnum(x){if(x>=1e12)return (x/1e12).toPrecision(3)+'T'; if(x>=1e9)return (x/1e9).toPrecision(3)+'B'; if(x>=1e6)return (x/1e6).toPrecision(3)+'M'; if(x>=1e3)return (x/1e3).toPrecision(3)+'K'; return x.toPrecision(3);}
document.addEventListener('input',e=>{const d=e.target.closest('.demo'); if(d&&UPDF[d.dataset.demo])UPDF[d.dataset.demo]();});

/* build flat slide list */
const SLIDES = [];
SLIDES.push({type:'cover'});
SLIDES.push({type:'howto'});
SECTIONS.forEach((s,i)=>{ SLIDES.push({type:'lead',sec:s,idx:i}); s.slides.forEach(p=>{p.secTitle=s.title; SLIDES.push(p);}); });
SLIDES.push({type:'map'});

/* clickable timeline built from the data */
function timelineSVG(){
  const y0=2017, y1=2026, W=640, X=y=>36+(y-y0)*(W-70)/(y1-y0);
  const perYear={};
  let dots='';
  SECTIONS.forEach(sec=>sec.slides.forEach(p=>{
    const yr=p.year, i=(perYear[yr]=(perYear[yr]||0)+1);
    const x=X(yr), y=96-(i-1)*8.5;
    dots+=`<g data-goto-paper="${p.no}" style="cursor:pointer"><circle cx="${x}" cy="${y}" r="4" fill="var(--accent)" opacity=".85"><title>#${p.no} · ${p.title} (${yr})</title></circle><circle cx="${x}" cy="${y}" r="8" fill="transparent"/></g>`;
  }));
  return `<svg viewBox="0 0 ${W} 130">
  <text x="8" y="16" style="font:700 11px Inter" fill="var(--accent-dark)">TEN YEARS, CLICKABLE</text>
  <text x="${W-24}" y="16" text-anchor="end" style="font:600 10px Inter" fill="var(--muted)">hover a dot for the paper · click to jump</text>
  <line x1="30" y1="108" x2="${W-24}" y2="108" stroke="var(--axis)"/>
  ${Array.from({length:10},(_,i)=>`<text x="${X(y0+i)}" y="124" text-anchor="middle" style="font:600 10px 'JetBrains Mono'" fill="var(--muted)">${String(y0+i).slice(2)}</text><line x1="${X(y0+i)}" y1="105" x2="${X(y0+i)}" y2="111" stroke="var(--axis)"/>`).join('')}
  ${dots}</svg>`;
}

/* ============================== RENDER ============================== */
const stage = document.getElementById('stage');
const els = SLIDES.map((s,i)=>{
  const d=document.createElement('div');
  d.className='slide '+(s.type==='lead'||s.type==='cover'?'lead':'content');
  d.dataset.i=i;
  if(s.type==='cover'){
    d.innerHTML=`<div class="kicker">Fast-forward · practical & complete</div>
    <h1>LLM Foundations</h1><h2>39 papers, for readers who already know the concepts</h2>
    <p>Each paper gets two lenses — <strong>In the paper</strong> (the ablations and appendix material everyone skips)
    and <strong>In practice (2026)</strong> (current defaults, gotchas, what superseded what).
    Two spines run through everything: <strong>decode is bandwidth-bound</strong> (#22) and
    <strong>verifiability determines the post-training method</strong> (#32).</p>
    <div class="minis">${SECTIONS.map((s,ix)=>`<span class="mini" data-go="${s.title}">${s.title.replace(/§\d+ · /,'')}</span>`).join('')}</div>`;
  } else if(s.type==='howto'){
    d.innerHTML=`<h1 class="gt">How to read this deck</h1>
    <table class="neat"><tbody>
    <tr><td style="width:210px"><strong>One slide per paper</strong></td><td>numbered to match the PDFs in this folder — the arXiv chip links to the paper</td></tr>
    <tr><td><strong>In the paper</strong></td><td>secondary contributions, ablations, appendix material</td></tr>
    <tr><td><strong>In practice (2026)</strong></td><td>current defaults, gotchas, what superseded what</td></tr>
    <tr><td><strong>Navigate</strong></td><td><code>←</code>/<code>→</code> slides · <code>G</code> overview grid · <code>/</code> search · <code>T</code> contents · <code>D</code> dark mode</td></tr>
    </tbody></table>
    <div class="callout">Two spines to watch: ① decode is <em>bandwidth-bound</em> (#22 → #23/24/25/35) · ② post-training method = f(<em>verifiability</em>) (#13 → #30/31/32).</div>

    <div class="minis">${s.sec.slides.map(p=>`<span class="mini" data-goto-paper="${p.no}">${p.no} · ${p.title.split('—')[0].trim()}</span>`).join('')}</div>`;
  } else if(s.type==='map'){
    d.innerHTML=`<h1 class="gt">Reading map — nine chains</h1>
    <table class="neat"><thead><tr><th style="width:190px">Chain</th><th>Path</th><th style="width:230px">Jump</th></tr></thead><tbody>
    ${CHAINS.map(c=>`<tr><td><strong>${c[0]}</strong></td><td>${c[1]}</td>
      <td>${c[2].map(n=>`<span class="mapchip" data-goto-paper="${n}">${n}</span>`).join('')}</td></tr>`).join('')}
    </tbody></table>
    <div class="callout">Bandwidth-bound decoding (#22) explains every inference paper; verifiability (#32) explains every post-training choice.</div>`;
  } else {
    const ax = s.arxiv ? `<a class="chip" href="https://arxiv.org/abs/${s.arxiv}" target="_blank" rel="noopener">arXiv ${s.arxiv}</a>` : `<span class="chip">OpenAI PDF · no arXiv</span>`;

  stage.appendChild(d);

/* ============================== NAV ============================== */
let cur = 0;
const counter=document.getElementById('counter'), progress=document.getElementById('progress'), secname=document.getElementById('secname');
function show(i,push=true){
  i=Math.max(0,Math.min(SLIDES.length-1,i));
  els.forEach((e,ix)=>{e.classList.toggle('active',ix===i); e.classList.toggle('prev',ix<i);});
  cur=i;
  counter.textContent=(i+1)+" / "+SLIDES.length;
  progress.style.width=((i)/(SLIDES.length-1)*100)+"%";
  const s=SLIDES[i];
  secname.textContent = s.type==='paper'?s.secTitle : s.type==='lead'?s.sec.title : s.type==='map'?'Reading map':'';
  if(push) history.replaceState(null,'','#'+(i+1));
  document.querySelectorAll('#toc .item').forEach((it,ix)=>it.classList.toggle('now',+it.dataset.i===i));
  els[i].scrollTop=0;
}
const paperIndex={};
SLIDES.forEach((s,i)=>{ if(s.type==='paper') paperIndex[String(s.no)]=i; });
function gotoPaper(no){ closeAll(); show(paperIndex[String(no)] ?? cur); }

document.getElementById('b-prev').onclick=()=>show(cur-1);
document.getElementById('b-next').onclick=()=>show(cur+1);
document.addEventListener('click',e=>{
  const g=e.target.closest('[data-goto-paper]'); if(g){gotoPaper(g.dataset.gotoPaper); return;}
  const m=e.target.closest('.mini[data-go]'); if(m){const t=m.dataset.go; const ix=SLIDES.findIndex(s=>s.type==='lead'&&s.sec.title===t); if(ix>=0){closeAll();show(ix);}}
});

/* overview */
const overview=document.getElementById('overview'), ovgrid=document.getElementById('ovgrid');
let ovBuilt=false;
function buildOv(){
  if(ovBuilt)return; ovBuilt=true;
  let html='';
  SLIDES.forEach((s,i)=>{
    if(s.type==='lead') html+=`<div class="ovsec">${s.sec.title} — ${s.sec.sub}</div>`;
    const cls = (s.type==='lead'||s.type==='cover')?'ovcard lead-card':'ovcard';
    const t = s.type==='cover'?'LLM Foundations':s.type==='howto'?'How to read':s.type==='lead'?s.sec.title:s.type==='map'?'Reading map':s.title;
    const n = s.type==='paper'?('#'+s.no+' · '+s.year):('slide '+(i+1));
    const sub = s.type==='paper'?(s.tl||''):'';
    html+=`<div class="${cls}" data-i="${i}"><div class="n">${n}</div><div class="t">${t}</div><div class="s">${sub.slice(0,90)}</div></div>`;
  });
  ovgrid.innerHTML=html;
  ovgrid.addEventListener('click',e=>{const c=e.target.closest('.ovcard'); if(c){show(+c.dataset.i); toggleOv(false);}});
}
function toggleOv(open){ buildOv(); overview.classList.toggle('open',open);
  if(open) ovgrid.querySelectorAll('.ovcard').forEach(c=>c.classList.toggle('now',+c.dataset.i===cur)); }
document.getElementById('b-grid').onclick=()=>toggleOv(!overview.classList.contains('open'));

/* toc */
const toc=document.getElementById('toc');
(function(){
  let html='';
  SLIDES.forEach((s,i)=>{
    if(s.type==='cover') html+=`<div class="item" data-i="${i}"><span class="n">◈</span>Cover</div>`;
    else if(s.type==='howto') html+=`<div class="item" data-i="${i}"><span class="n">·</span>How to read</div>`;
    else if(s.type==='lead') html+=`<div class="sec">${s.sec.title}</div>`;
    else if(s.type==='map') html+=`<div class="sec">Closing</div><div class="item" data-i="${i}"><span class="n">⇄</span>Reading map</div>`;
    else html+=`<div class="item" data-i="${i}"><span class="n">${s.no}</span>${s.title}</div>`;
  });
  toc.innerHTML=html;
  toc.addEventListener('click',e=>{const it=e.target.closest('.item'); if(it){show(+it.dataset.i); toc.classList.remove('open');}});
})();
document.getElementById('b-toc').onclick=()=>toc.classList.toggle('open');

/* search */
const search=document.getElementById('search'), sinput=document.getElementById('sinput'), sresults=document.getElementById('sresults');
const INDEX = SLIDES.map((s,i)=>({i, no:s.no??'', t: s.type==='paper'?s.title : s.type==='lead'?s.sec.title : s.type==='map'?'Reading map': s.type==='howto'?'How to read':'Cover',
  body:(s.type==='paper'? [s.tl,...(s.paper||[]),...(s.practice||[])].join(' ') : '').replace(/<[^>]+>/g,'').toLowerCase(),
  sec:s.secTitle||''}));
let sel=0, hits=[];
function doSearch(q){
  q=q.trim().toLowerCase();
  hits = !q ? [] : INDEX.filter(x=> x.t.toLowerCase().includes(q) || String(x.no).toLowerCase()===q || x.body.includes(q)).slice(0,12);
  sel=0;
  sresults.innerHTML=hits.map((h,ix)=>`<div class="sres ${ix===0?'sel':''}" data-i="${h.i}"><span class="n">${h.no||'·'}</span><span class="t">${h.t}</span><span class="x">${h.sec.replace(/§\d+ · /,'')}</span></div>`).join('');
}
sinput.addEventListener('input',()=>doSearch(sinput.value));
sresults.addEventListener('click',e=>{const r=e.target.closest('.sres'); if(r){show(+r.dataset.i); closeAll();}});
function openSearch(){ search.classList.add('open'); sinput.value=''; doSearch(''); setTimeout(()=>sinput.focus(),30); }
document.getElementById('b-search').onclick=openSearch;

/* help / theme */
const help=document.getElementById('help');
document.getElementById('b-help').onclick=()=>help.classList.toggle('open');
function setTheme(t){ document.documentElement.dataset.theme=t; localStorage.setItem('llmslides-theme',t); }
document.getElementById('b-theme').onclick=()=>setTheme(document.documentElement.dataset.theme==='dark'?'light':'dark');
setTheme(localStorage.getItem('llmslides-theme')|| (matchMedia('(prefers-color-scheme: dark)').matches?'dark':'light'));

function closeAll(){ overview.classList.remove('open'); toc.classList.remove('open'); search.classList.remove('open'); help.classList.remove('open'); }

/* keyboard */
document.addEventListener('keydown',e=>{
  if(search.classList.contains('open')){
    if(e.key==='Escape'){closeAll();}
    else if(e.key==='ArrowDown'){sel=Math.min(hits.length-1,sel+1); paint();}
    else if(e.key==='ArrowUp'){sel=Math.max(0,sel-1); paint();}
    else if(e.key==='Enter' && hits[sel]){show(hits[sel].i); closeAll();}
    function paint(){[...sresults.children].forEach((c,ix)=>c.classList.toggle('sel',ix===sel));}
    return;
  }
  if(e.key==='/' || ((e.metaKey||e.ctrlKey)&&e.key==='k')){e.preventDefault(); openSearch(); return;}
  if(e.key==='Escape'){ if(toc.classList.contains('open')||help.classList.contains('open')){closeAll();} else toggleOv(!overview.classList.contains('open')); return;}
  if(overview.classList.contains('open') && (e.key==='g'||e.key==='G')){toggleOv(false); return;}
  switch(e.key){
    case 'ArrowRight': case ' ': case 'PageDown': e.preventDefault(); closeAll(); show(cur+1); break;
    case 'ArrowLeft': case 'PageUp': e.preventDefault(); closeAll(); show(cur-1); break;
    case 'Home': show(0); break;
    case 'End': show(SLIDES.length-1); break;
    case 'g': case 'G': toggleOv(!overview.classList.contains('open')); break;
    case 't': case 'T': toc.classList.toggle('open'); break;
    case 'd': case 'D': document.getElementById('b-theme').click(); break;
    case '?': help.classList.toggle('open'); break;
  }
});

/* touch swipe */
let tx=null;
document.addEventListener('touchstart',e=>{tx=e.touches[0].clientX;},{passive:true});
document.addEventListener('touchend',e=>{
  if(tx===null)return; const dx=e.changedTouches[0].clientX-tx; tx=null;
  if(Math.abs(dx)>60){ dx<0?show(cur+1):show(cur-1); }
},{passive:true});

/* init from hash */
const h=parseInt(location.hash.slice(1)); show(isNaN(h)?0:h-1,false);
Object.values(UPDF).forEach(f=>f());
document.querySelectorAll('.dctl').forEach(c=>{const l=c.querySelector('label'),i=c.querySelector('input,select'); if(l&&i&&!i.getAttribute('aria-label'))i.setAttribute('aria-label',l.textContent);});
</script>
</body>
</html>
