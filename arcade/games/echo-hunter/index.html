<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no">
<title>Echo Hunter</title>
<style>
  :root{
    --ink:#9fd8e2; --dim:#3c5a63; --bg:#0a0a0e;
  }
  *{margin:0;padding:0;box-sizing:border-box;-webkit-tap-highlight-color:transparent;}
  html,body{height:100%;overflow:hidden;background:var(--bg);}
  body{font-family:ui-monospace,'SF Mono',Menlo,Consolas,monospace;color:var(--ink);touch-action:none;}
  #c{position:fixed;inset:0;display:block;touch-action:none;cursor:crosshair;}
  .hud{position:fixed;top:12px;left:50%;transform:translateX(-50%);display:flex;gap:18px;
    font-size:13px;letter-spacing:1px;color:#4f7f8c;pointer-events:none;z-index:5;
    text-shadow:0 0 8px rgba(60,140,160,.35);user-select:none;}
  .hud .hearts{color:#7c3a48;}
  .corner{position:fixed;z-index:6;font-size:12px;}
  a.pill,button.pill{
    display:inline-block;background:rgba(20,32,38,.55);border:1px solid #24424c;color:#7fb7c4;
    border-radius:999px;padding:7px 16px;font:inherit;font-size:12px;letter-spacing:1px;
    text-decoration:none;cursor:pointer;user-select:none;backdrop-filter:blur(2px);
  }
  a.pill:hover,button.pill:hover{background:rgba(30,52,60,.75);color:#b7ecf7;border-color:#3a6e7c;}
  button.pill.primary{background:rgba(28,66,76,.75);color:#c9f4ff;border-color:#4c8ea0;padding:11px 34px;font-size:14px;}
  button.pill.primary:hover{background:rgba(40,90,102,.85);}
  #backLink{top:12px;left:12px;}
  #muteBtn{top:12px;right:12px;}
  .ov{position:fixed;inset:0;display:flex;flex-direction:column;align-items:center;justify-content:center;
    background:radial-gradient(ellipse at center,rgba(10,12,16,.55) 0%,rgba(8,8,12,.92) 78%);
    z-index:10;text-align:center;padding:20px;}
  .ov.hidden{display:none;}
  .ov h1{font-size:clamp(30px,7vw,54px);font-weight:600;letter-spacing:8px;color:#bdf0fb;
    text-shadow:0 0 24px rgba(90,220,255,.45),0 0 60px rgba(40,140,180,.25);margin-bottom:10px;}
  .ov h2{font-size:clamp(20px,4.5vw,32px);letter-spacing:5px;color:#a7e4f0;margin-bottom:12px;
    text-shadow:0 0 18px rgba(90,220,255,.4);}
  .ov p{font-size:13px;line-height:1.75;color:#5d8894;max-width:520px;margin:5px 0 18px;}
  .ov .tag{font-size:11px;color:#3f636e;letter-spacing:2px;margin-top:16px;}
  .ov .coins{font-size:14px;color:#c8a84e;margin-top:14px;letter-spacing:1px;text-shadow:0 0 10px rgba(220,180,70,.3);}
  .ov .luckypop{color:#7dff8a;font-size:18px;font-weight:800;letter-spacing:1px;margin-top:8px;text-shadow:0 0 14px rgba(125,255,138,.85),0 0 4px rgba(200,168,78,.9);animation:luckypop .9s ease-out;}
  .ov .ticketpop{color:#5ee7ff;font-size:13px;font-weight:700;margin-top:6px;text-shadow:0 0 10px rgba(94,231,255,.8);animation:luckypop .9s ease-out;}
  @keyframes luckypop{0%{transform:scale(.3);opacity:0}55%{transform:scale(1.28)}100%{transform:scale(1);opacity:1}}
  .ov .stats{font-size:13px;color:#6fa4b1;margin-bottom:6px;letter-spacing:1px;}
  .keys{display:inline-block;text-align:left;font-size:12px;color:#54818e;line-height:2;}
  .keys b{color:#8fc9d6;font-weight:600;}
  .danger h2{color:#e88a94;text-shadow:0 0 20px rgba(230,80,100,.5);}
</style>

<body>
<canvas id="c"></canvas>
<div class="hud" id="hud"></div>
<a class="pill corner" id="backLink" href="../../arcade.html">&larr; Arcade</a>
<button class="pill corner" id="muteBtn">🔊 Sound</button>
<div class="ov" id="ov"></div>

<script src="../../lib/anime.min.js"></script>
<script>
"use strict";
/* ============================================================
   ECHO HUNTER — core (DOM-free, testable under Node)
   ============================================================ */
var EH = (function(){

  var CELL=40, WAVE_SPEED=420, PING_MAX_R=620, PING_AUDIBLE=950, FADE=2.5,
      PING_CD=0.9, FOOT_REVEAL=70, FOOT_AUDIBLE=190, FOOT_PERIOD=0.3,
      WALK_SPEED=88, RUN_SPEED=178, PLAYER_R=10, STALKER_R=12,
      ALERT_SPEED=74, FRENZY_SPEED=252, FRENZY_R=80, TOUCH_R=22, ESCAPE_R=280,
      CLICK_R=250, WORM_R=20, EXIT_R=28, SCREAM_SPEED=900;

  function mulberry32(a){
    return function(){
      a|=0; a=(a+0x6D2B79F5)|0;
      var t=Math.imul(a^(a>>>15),1|a);
      t=(t+Math.imul(t^(t>>>7),61|t))^t;
      return ((t^(t>>>14))>>>0)/4294967296;
    };
  }
  function dist(x1,y1,x2,y2){ var dx=x2-x1,dy=y2-y1; return Math.sqrt(dx*dx+dy*dy); }
  function clamp(v,a,b){ return v<a?a:(v>b?b:v); }
  function angDiff(a,b){ var d=(a-b)%(Math.PI*2); if(d>Math.PI)d-=Math.PI*2; if(d<-Math.PI)d+=Math.PI*2; return Math.abs(d); }

  var LEVELS=[
    {gw:40,gh:30,fill:0.44,stalkers:2,quota:3,worms:4},
    {gw:44,gh:32,fill:0.45,stalkers:3,quota:4,worms:5},
    {gw:48,gh:34,fill:0.48,stalkers:4,quota:5,worms:6},
    {gw:50,gh:36,fill:0.47,stalkers:4,quota:5,worms:6,screamer:true},
    {gw:56,gh:40,fill:0.45,stalkers:3,quota:6,worms:7,matriarch:true}
  ];

  /* ---------- level generation ---------- */
  function genGrid(gw,gh,fill,rng){
    var g=new Uint8Array(gw*gh),x,y,it,dx,dy,c;
    for(y=0;y<gh;y++)for(x=0;x<gw;x++)
      g[y*gw+x]=(x===0||y===0||x===gw-1||y===gh-1||rng()<fill)?1:0;
    for(it=0;it<4;it++){
      var ng=new Uint8Array(g);
      for(y=1;y<gh-1;y++)for(x=1;x<gw-1;x++){
        c=0;
        for(dy=-1;dy<=1;dy++)for(dx=-1;dx<=1;dx++)c+=g[(y+dy)*gw+x+dx];
        ng[y*gw+x]=c>=5?1:0;
      }
      g=ng;
    }
    return g;
  }
  function largestRegion(g,gw,gh){
    var seen=new Int32Array(g.length),i; for(i=0;i<seen.length;i++)seen[i]=-1;
    var best=-1,bestSize=0,id=0;
    for(i=0;i<g.length;i++){
      if(g[i]===0&&seen[i]<0){
        var q=[i],size=0; seen[i]=id;
        while(q.length){
          var cc=q.pop(); size++;
          var x=cc%gw,y=(cc/gw)|0;
          var nb=[[1,0],[-1,0],[0,1],[0,-1]];
          for(var k=0;k<4;k++){
            var nx=x+nb[k][0],ny=y+nb[k][1];
            if(nx<0||ny<0||nx>=gw||ny>=gh)continue;
            var ni=ny*gw+nx;
            if(g[ni]===0&&seen[ni]<0){seen[ni]=id;q.push(ni);}
          }
        }
        if(size>bestSize){bestSize=size;best=id;}
        id++;
      }
    }
    for(i=0;i<g.length;i++) if(g[i]===0&&seen[i]!==best) g[i]=1;
    return bestSize;
  }
  function buildSegs(g,gw,gh){
    var segs=[],x,y;
    function add(x1,y1,x2,y2){
      segs.push({x1:x1,y1:y1,x2:x2,y2:y2,mx:(x1+x2)/2,my:(y1+y2)/2,lit:-1e9});
    }
    for(y=1;y<gh-1;y++)for(x=1;x<gw-1;x++){
      if(g[y*gw+x]!==0)continue;
      var X=x*CELL,Y=y*CELL;
      if(g[y*gw+x-1]===1)add(X,Y,X,Y+CELL);
      if(g[y*gw+x+1]===1)add(X+CELL,Y,X+CELL,Y+CELL);
      if(g[(y-1)*gw+x]===1)add(X,Y,X+CELL,Y);
      if(g[(y+1)*gw+x]===1)add(X,Y+CELL,X+CELL,Y+CELL);
    }
    return segs;
  }
  function buildFeatures(g,gw,gh){
    var f=[],n=0,x,y;
    for(y=1;y<gh-1;y++)for(x=1;x<gw-1;x++){
      if(g[y*gw+x]!==1)continue;
      if(g[y*gw+x-1]===0||g[y*gw+x+1]===0||g[(y-1)*gw+x]===0||g[(y+1)*gw+x]===0){
        n++;
        if(n%6===0)f.push({x:(x+0.5)*CELL,y:(y+0.5)*CELL});
      }
    }
    return f;
  }
  function mkStalker(x,y){
    return {x:x,y:y,state:'dormant',tx:x,ty:y,lastHeard:-1e9,clickT:1,
            waitT:0,calm:0,lit:-1e9,alive:true};
  }
  function mkScreamer(x,y){
    return {x:x,y:y,hearR:420,cd:0,heard:false,lit:-1e9};
  }
  function mkMatriarch(x,y){
    return {x:x,y:y,ang:0,angVel:0.42,coneHalf:0.5,coneR:520,
            huntT:0,lastDetect:-1e9,revT:0,lit:-1e9};
  }

  function genLevel(n){
    var cfg=LEVELS[n-1];
    for(var attempt=0;attempt<60;attempt++){
      var rng=mulberry32(n*7919+attempt*104729+13);
      var gw=cfg.gw,gh=cfg.gh;
      var grid=genGrid(gw,gh,cfg.fill,rng);
      var size=largestRegion(grid,gw,gh);
      if(size<gw*gh*0.26)continue;
      // open cells: floor with 4-neighbors also floor (roomy spawn points)
      var open=[],x,y;
      for(y=1;y<gh-1;y++)for(x=1;x<gw-1;x++){
        if(grid[y*gw+x]===0&&grid[y*gw+x-1]===0&&grid[y*gw+x+1]===0&&
           grid[(y-1)*gw+x]===0&&grid[(y+1)*gw+x]===0)
          open.push({x:(x+0.5)*CELL,y:(y+0.5)*CELL});
      }
      if(open.length<40)continue;
      function pick(ok){
        for(var t=0;t<500;t++){
          var c=open[(rng()*open.length)|0];
          if(ok(c))return c;
        }
        return null;
      }
      var P=open[(rng()*open.length)|0];
      // exit: farthest of 80 samples
      var exitC=null,exD=-1;
      for(var s=0;s<80;s++){
        var c=open[(rng()*open.length)|0];
        var d=dist(P.x,P.y,c.x,c.y);
        if(d>exD){exD=d;exitC=c;}
      }
      if(!exitC||exD<Math.min(gw,gh)*CELL*0.4)continue;
      var worms=[],ok=true,i;
      for(i=0;i<cfg.worms;i++){
        var wc=pick(function(c){
          if(dist(c.x,c.y,P.x,P.y)<200)return false;
          if(dist(c.x,c.y,exitC.x,exitC.y)<100)return false;
          for(var j=0;j<worms.length;j++)
            if(dist(c.x,c.y,worms[j].x,worms[j].y)<110)return false;
          return true;
        });
        if(!wc){ok=false;break;}
        worms.push({x:wc.x,y:wc.y,alive:true,period:3+rng()*2,
                    phase:rng()*3,pulseT:-9,lit:-1e9});
      }
      if(!ok)continue;
      var stalkers=[];
      for(i=0;i<cfg.stalkers;i++){
        var sc=pick(function(c){
          if(dist(c.x,c.y,P.x,P.y)<340)return false;
          for(var j=0;j<stalkers.length;j++)
            if(dist(c.x,c.y,stalkers[j].x,stalkers[j].y)<160)return false;
          return true;
        });
        if(!sc){ok=false;break;}
        stalkers.push(mkStalker(sc.x,sc.y));
      }
      if(!ok)continue;
      var screamer=null,matriarch=null;
      if(cfg.screamer){
        var scc=pick(function(c){
          return dist(c.x,c.y,P.x,P.y)>380&&dist(c.x,c.y,exitC.x,exitC.y)>200;
        });
        if(!scc)continue;
        screamer=mkScreamer(scc.x,scc.y);
      }
      if(cfg.matriarch){
        var mc=pick(function(c){ return dist(c.x,c.y,P.x,P.y)>520; });
        if(!mc)continue;
        matriarch=mkMatriarch(mc.x,mc.y);
      }
      return {
        n:n,gw:gw,gh:gh,grid:grid,w:gw*CELL,h:gh*CELL,
        segs:buildSegs(grid,gw,gh),features:buildFeatures(grid,gw,gh),
        px:P.x,py:P.y,worms:worms,quota:cfg.quota,
        exit:{x:exitC.x,y:exitC.y,discovered:false,humT:1.5,lit:-1e9},
        stalkers:stalkers,screamer:screamer,matriarch:matriarch,
        rng:rng
      };
    }
    throw new Error('level generation failed for '+n);
  }

  /* ---------- state ---------- */
  function newGame(){
    return {level:1,hearts:3,totalWorms:0,phase:'play',time:0,events:[],
            L:null,px:0,py:0,worms:0,ripples:[],pending:[],
            pingCd:0,footT:0,lastPingT:-1e9,lastRunT:-1e9};
  }
  function applyLevel(state,L){
    state.L=L; state.px=L.px; state.py=L.py;
    state.worms=0; state.ripples=[]; state.pending=[];
    state.pingCd=0; state.footT=0;
    state.lastPingT=-1e9; state.lastRunT=-1e9;
    state.phase='play';
  }
  function startLevel(state,n){
    state.level=n;
    applyLevel(state,genLevel(n));
  }
  // open 30x30 arena, no entities — for headless tests
  function testState(){
    var gw=30,gh=30,grid=new Uint8Array(gw*gh),x,y;
    for(y=0;y<gh;y++)for(x=0;x<gw;x++)
      grid[y*gw+x]=(x===0||y===0||x===gw-1||y===gh-1)?1:0;
    var L={n:1,gw:gw,gh:gh,grid:grid,w:gw*CELL,h:gh*CELL,
      segs:buildSegs(grid,gw,gh),features:[],px:15*CELL,py:15*CELL,
      worms:[],quota:1,
      exit:{x:25*CELL,y:25*CELL,discovered:false,humT:1.5,lit:-1e9},
      stalkers:[],screamer:null,matriarch:null,rng:mulberry32(1)};
    var st=newGame();
    st.level=1;
    applyLevel(st,L);
    return st;
  }

  /* ---------- physics ---------- */
  function blocked(L,x,y,r){
    var x0=Math.floor((x-r)/CELL),x1=Math.floor((x+r)/CELL),
        y0=Math.floor((y-r)/CELL),y1=Math.floor((y+r)/CELL),cx,cy;
    for(cy=y0;cy<=y1;cy++)for(cx=x0;cx<=x1;cx++){
      if(cx<0||cy<0||cx>=L.gw||cy>=L.gh)return true;
      if(L.grid[cy*L.gw+cx]){
        var nx=Math.max(cx*CELL,Math.min(x,(cx+1)*CELL));
        var ny=Math.max(cy*CELL,Math.min(y,(cy+1)*CELL));
        var dx=nx-x,dy=ny-y;
        if(dx*dx+dy*dy<r*r)return true;
      }
    }
    return false;
  }
  function slide(L,e,dx,dy,r){
    if(!blocked(L,e.x+dx,e.y,r))e.x+=dx;
    if(!blocked(L,e.x,e.y+dy,r))e.y+=dy;
  }
  function stepToward(L,e,tx,ty,step,r){
    var dx=tx-e.x,dy=ty-e.y,d=Math.sqrt(dx*dx+dy*dy);
    if(d<1e-6)return;
    if(step>d)step=d;
    slide(L,e,dx/d*step,dy/d*step,r);
  }

  /* ---------- sound propagation ---------- */
  function addRipple(state,x,y,maxR,reveal,kind,speed){
    state.ripples.push({ox:x,oy:y,r:0,prevR:0,maxR:maxR,reveal:reveal,
                        kind:kind,t0:state.time,speed:speed||WAVE_SPEED});
  }
  function soundEvent(state,x,y,r,kind){
    var i,ss=state.L.stalkers;
    for(i=0;i<ss.length;i++){
      var s=ss[i];
      if(!s.alive)continue;
      if(dist(x,y,s.x,s.y)<=r){
        s.lastHeard=state.time;
        s.tx=x; s.ty=y; s.waitT=0;
        if(s.state!=='frenzy')s.state='alerted';
      }
    }
    var sc=state.L.screamer;
    if(sc&&sc.cd<=0&&dist(x,y,sc.x,sc.y)<=Math.min(r,sc.hearR))sc.heard=true;
  }
  function playerPing(state){
    if(state.pingCd>0||state.phase!=='play')return false;
    state.pingCd=PING_CD;
    var x=state.px,y=state.py;
    addRipple(state,x,y,PING_MAX_R,true,'ping');
    state.lastPingT=state.time;
    soundEvent(state,x,y,PING_AUDIBLE,'ping');
    // echoes off nearest large obstacles: delayed pips + secondary ripples
    var feats=[],i,f,d;
    for(i=0;i<state.L.features.length;i++){
      f=state.L.features[i];
      d=dist(x,y,f.x,f.y);
      if(d>60&&d<PING_MAX_R)feats.push({f:f,d:d});
    }
    feats.sort(function(a,b){return a.d-b.d;});
    for(i=0;i<Math.min(6,feats.length);i++){
      f=feats[i].f; d=feats[i].d;
      state.pending.push({at:state.time+d/WAVE_SPEED,x:f.x,y:f.y,maxR:90});
      state.events.push({type:'echo',delay:2*d/WAVE_SPEED,
        pan:clamp((f.x-x)/Math.max(1,d),-1,1),gain:Math.max(0.06,1-d/PING_MAX_R)});
    }
    state.events.push({type:'ping'});
    return true;
  }
  function footstep(state){
    addRipple(state,state.px,state.py,FOOT_REVEAL,true,'foot');
    soundEvent(state,state.px,state.py,FOOT_AUDIBLE,'foot');
    state.events.push({type:'foot'});
  }
  function triggerScream(state){
    var sc=state.L.screamer;
    if(!sc)return;
    sc.heard=false; sc.cd=9; sc.lit=state.time;
    var reach=Math.max(state.L.w,state.L.h)*1.5;
    addRipple(state,sc.x,sc.y,reach,true,'scream',SCREAM_SPEED);
    var ss=state.L.stalkers;
    for(var i=0;i<ss.length;i++){
      var s=ss[i];
      if(!s.alive)continue;
      if(s.state!=='frenzy')s.state='alerted';
      s.tx=state.px; s.ty=state.py;
      s.lastHeard=state.time; s.waitT=0;
    }
    state.events.push({type:'scream',x:sc.x,y:sc.y});
  }
  function kill(state){
    state.hearts--;
    state.phase=state.hearts>0?'dead':'over';
    addRipple(state,state.px,state.py,1500,false,'death',1200);
    state.events.push({type:'death'});
  }
  function segAlpha(lit,now){
    var age=now-lit;
    if(age<0||age>=FADE)return 0;
    var a=1-age/FADE;
    return a*a;
  }

  /* ---------- update ---------- */
  function update(state,dt,input){
    input=input||{};
    state.time+=dt;
    var playing=state.phase==='play';
    var L=state.L,i,j,s,d;

    if(playing){
      state.pingCd=Math.max(0,state.pingCd-dt);
      // --- movement ---
      var ax=input.ax||0,ay=input.ay||0;
      var m=Math.sqrt(ax*ax+ay*ay);
      if(m>1){ax/=m;ay/=m;}
      var run=!!input.run&&m>0;
      if(m>0){
        var sp=run?RUN_SPEED:WALK_SPEED;
        var pe={x:state.px,y:state.py};
        slide(L,pe,sp*ax*dt,sp*ay*dt,PLAYER_R);
        state.px=pe.x; state.py=pe.y;
        if(run){
          state.lastRunT=state.time;
          state.footT-=dt;
          if(state.footT<=0){state.footT=FOOT_PERIOD;footstep(state);}
        }else state.footT=0.12;
      }
      if(input.ping)playerPing(state);
    }

    // --- pending echo ripples ---
    for(i=state.pending.length-1;i>=0;i--){
      var p=state.pending[i];
      if(state.time>=p.at){
        addRipple(state,p.x,p.y,p.maxR,false,'echo');
        state.pending.splice(i,1);
      }
    }

    // --- ripples: expand + reveal ---
    for(i=state.ripples.length-1;i>=0;i--){
      var rp=state.ripples[i];
      rp.prevR=rp.r;
      rp.r+=rp.speed*dt;
      if(rp.reveal&&rp.prevR<rp.maxR){
        var rr=Math.min(rp.r,rp.maxR),pr=rp.prevR;
        var segs=L.segs;
        for(j=0;j<segs.length;j++){
          var sg=segs[j];
          var dx=sg.mx-rp.ox; if(dx>rr||dx<-rr)continue;
          var dy=sg.my-rp.oy; if(dy>rr||dy<-rr)continue;
          d=Math.sqrt(dx*dx+dy*dy);
          if(d>pr&&d<=rr){
            var lt=rp.t0+d/rp.speed;
            if(lt>sg.lit)sg.lit=lt;
          }
        }
        // reveal creatures & exit the same way
        function lightEnt(e){
          var dd=dist(rp.ox,rp.oy,e.x,e.y);
          if(dd>pr&&dd<=rr){
            var lt2=rp.t0+dd/rp.speed;
            if(lt2>e.lit)e.lit=lt2;
            return true;
          }
          return false;
        }
        for(j=0;j<L.worms.length;j++)if(L.worms[j].alive)lightEnt(L.worms[j]);
        for(j=0;j<L.stalkers.length;j++)if(L.stalkers[j].alive)lightEnt(L.stalkers[j]);
        if(lightEnt(L.exit))L.exit.discovered=true;
        if(L.screamer)lightEnt(L.screamer);
        if(L.matriarch)lightEnt(L.matriarch);
      }
      if(rp.r>rp.maxR+120)state.ripples.splice(i,1);
    }
    if(!playing)return; // death/clear: ripples keep playing out, world freezes

    // --- glowworms ---
    for(i=0;i<L.worms.length;i++){
      var w=L.worms[i];
      if(!w.alive)continue;
      w.phase-=dt;
      if(w.phase<=0){
        w.phase=w.period;
        w.pulseT=state.time;
        state.events.push({type:'pulse',x:w.x,y:w.y});
      }
      if(dist(state.px,state.py,w.x,w.y)<WORM_R){
        w.alive=false;
        state.worms++; state.totalWorms++;
        state.events.push({type:'worm'});
      }
    }

    // --- exit ---
    var E=L.exit;
    if(E.discovered){
      E.humT-=dt;
      if(E.humT<=0){
        E.humT=2.2;
        addRipple(state,E.x,E.y,60,false,'hum');
        state.events.push({type:'hum',x:E.x,y:E.y});
      }
    }
    if(state.worms>=L.quota&&dist(state.px,state.py,E.x,E.y)<EXIT_R){
      state.phase='clear';
      state.events.push({type:'clear'});
      return;
    }

    // --- stalkers ---
    var heardRecently;
    for(i=0;i<L.stalkers.length;i++){
      s=L.stalkers[i];
      if(!s.alive)continue;
      d=dist(s.x,s.y,state.px,state.py);
      if(s.state!=='frenzy'&&d<FRENZY_R){
        s.state='frenzy'; s.calm=0; s.clickT=0;
        state.events.push({type:'frenzy',x:s.x,y:s.y});
      }
      if(s.state==='frenzy'){
        s.tx=state.px; s.ty=state.py;
        stepToward(L,s,s.tx,s.ty,FRENZY_SPEED*dt,STALKER_R);
        d=dist(s.x,s.y,state.px,state.py);
        if(d<TOUCH_R){ kill(state); return; }
        heardRecently=(state.time-state.lastPingT<2)||(state.time-state.lastRunT<2)||
                      (state.time-s.lastHeard<2);
        if(d>ESCAPE_R&&!heardRecently){
          s.calm+=dt;
          if(s.calm>2.5){s.state='alerted';s.calm=0;s.waitT=0;}
        }else s.calm=0;
        s.clickT-=dt;
        if(s.clickT<=0){
          s.clickT=0.45;
          addRipple(state,s.x,s.y,200,true,'click');
          s.lit=state.time;
          state.events.push({type:'click',x:s.x,y:s.y,fast:true});
        }
      }else if(s.state==='alerted'){
        var td=dist(s.x,s.y,s.tx,s.ty);
        if(td>12){
          stepToward(L,s,s.tx,s.ty,ALERT_SPEED*dt,STALKER_R);
          s.waitT=0;
        }else{
          s.waitT+=dt;
          if(s.waitT>4)s.state='dormant';
        }
        s.clickT-=dt;
        if(s.clickT<=0){
          s.clickT=1.3+L.rng()*0.9;
          addRipple(state,s.x,s.y,CLICK_R,true,'click');
          s.lit=state.time;
          state.events.push({type:'click',x:s.x,y:s.y});
        }
      }
    }

    // --- screamer ---
    var sc=L.screamer;
    if(sc){
      sc.cd=Math.max(0,sc.cd-dt);
      if(sc.cd<=0&&dist(state.px,state.py,sc.x,sc.y)<110)sc.heard=true;
      if(sc.heard&&sc.cd<=0)triggerScream(state);
    }

    // --- matriarch ---
    var M=L.matriarch;
    if(M){
      M.ang+=M.angVel*dt;
      M.revT-=dt;
      if(M.revT<=0){
        M.revT=0.15;
        for(j=0;j<L.segs.length;j++){
          var sg2=L.segs[j];
          var ddx=sg2.mx-M.x,ddy=sg2.my-M.y;
          if(ddx>M.coneR||ddx<-M.coneR||ddy>M.coneR||ddy<-M.coneR)continue;
          var dd2=Math.sqrt(ddx*ddx+ddy*ddy);
          if(dd2<M.coneR&&angDiff(Math.atan2(ddy,ddx),M.ang)<M.coneHalf)
            sg2.lit=state.time;
        }
      }
      var mdx=state.px-M.x,mdy=state.py-M.y;
      var md=Math.sqrt(mdx*mdx+mdy*mdy);
      if(md<M.coneR&&angDiff(Math.atan2(mdy,mdx),M.ang)<M.coneHalf){
        if(state.time-M.lastDetect>1.5){
          M.lastDetect=state.time;
          M.huntT=6;
          for(i=0;i<L.stalkers.length;i++){
            s=L.stalkers[i];
            if(!s.alive)continue;
            if(s.state!=='frenzy')s.state='alerted';
            s.tx=state.px; s.ty=state.py; s.lastHeard=state.time; s.waitT=0;
          }
          state.events.push({type:'sweepHit'});
        }
      }
      if(M.huntT>0){
        M.huntT-=dt;
        stepToward(L,M,state.px,state.py,58*dt,30);
      }
      if(md<48){ kill(state); return; }
    }

    if(state.events.length>400)state.events.splice(0,state.events.length-400);
  }

  return {
    CELL:CELL,WAVE_SPEED:WAVE_SPEED,PING_MAX_R:PING_MAX_R,PING_AUDIBLE:PING_AUDIBLE,
    FADE:FADE,PING_CD:PING_CD,FOOT_REVEAL:FOOT_REVEAL,FOOT_AUDIBLE:FOOT_AUDIBLE,
    FOOT_PERIOD:FOOT_PERIOD,WALK_SPEED:WALK_SPEED,RUN_SPEED:RUN_SPEED,
    PLAYER_R:PLAYER_R,FRENZY_R:FRENZY_R,TOUCH_R:TOUCH_R,ESCAPE_R:ESCAPE_R,
    CLICK_R:CLICK_R,WORM_R:WORM_R,EXIT_R:EXIT_R,LEVELS:LEVELS,

    footstep:footstep,triggerScream:triggerScream,blocked:blocked,segAlpha:segAlpha

    var cleared=victory?5:(game.level-1);
    var award=awardCoinsPlus('echo-hunter',coinsForRun(cleared));
    var prevBest=loadBest();
    var depthReached=victory?5:game.level;
    var newBest=depthReached>(prevBest.bestLevel||0)||game.totalWorms>(prevBest.bestWorms||0);
    saveBest(depthReached,game.totalWorms);
    var reward='<div class="coins" id="endCoins">+'+award.n+' 🪙 <span style="opacity:.7">(wallet '+award.total+')</span></div>';
    if(award.lucky>1)reward+='<div class="luckypop">🍀 LUCKY ×'+award.lucky+'!</div>';
    if(award.ticket)reward+='<div class="ticketpop">🎟 PULL TICKET!</div>';
    if(newBest)reward+='<div class="stats" id="endBest" style="color:#7dd8ff;margin-top:8px;letter-spacing:2px">★ NEW BEST</div>';
    if(award.lucky>1){
      if(AC){var lt=AC.currentTime;[523,659,784,1047].forEach(function(f,i){tone({f0:f,dur:0.12,type:'triangle',gain:0.12,when:lt+i*0.09});});}
      vib(30);
    }
    if(victory){
      ui='victory';
      showOv('<h2 id="endTitle">YOU SURFACED</h2>'+
        '<p>Five caves deep and back out alive. The Matriarch\'s song fades below you.</p>'+
        '<div class="stats">glowworms: <span id="stWorms">'+game.totalWorms+'</span></div>'+
        reward+
        '<button class="pill primary" id="againBtn" style="margin-top:16px">Descend again</button>'+
        '<div class="tag"><a class="pill" href="../../arcade.html">&larr; Arcade</a> <a class="pill" href="../../vault.html">🎴 Card Vault</a></div>');
    }else{
      ui='over';
      showOv('<h2 id="endTitle">SWALLOWED BY THE DARK</h2>'+
        '<p>The cave keeps what it catches.</p>'+
        '<div class="stats">depth <span id="stDepth">'+game.level+'</span> · glowworms <span id="stWorms">'+game.totalWorms+'</span></div>'+
        reward+
        '<button class="pill primary" id="againBtn" style="margin-top:16px">Try again</button>'+
        '<div class="tag"><a class="pill" href="../../arcade.html">&larr; Arcade</a> <a class="pill" href="../../vault.html">🎴 Card Vault</a></div>',true);
    }
    bindBtn('againBtn',function(){ showTitle(); });
    // reward-moment motion (DOM overlay only; no-op without anime.js)
    fxPop(document.getElementById('endTitle'),1.5);
    var dEl=document.getElementById('stDepth');
    if(dEl)fxCountUp(dEl,'',game.level,'');
    var wEl=document.getElementById('stWorms');
    if(wEl)fxCountUp(wEl,'',game.totalWorms,'');
    fxPop(document.getElementById('endCoins'),1.2);
    fxPop(document.getElementById('endBest'),1.35);
  }
  function showDead(){
    stopDrone();
    showOv('<h2>CAUGHT</h2>'+
      '<p>It found you in the black. '+game.hearts+(game.hearts===1?' heart':' hearts')+' left.</p>'+
      '<button class="pill primary" id="retryBtn">Steady yourself</button>',true);
    bindBtn('retryBtn',function(){
      EH.startLevel(game,game.level);
      ui='play'; hideOv(); levelIntro();
    });
  }
  function showClear(){
    if(game.level>=5){ endRun(true); return; }
    showOv('<h2>SHAFT REACHED</h2>'+
      '<p>You climb toward colder air. The next cave is tighter, and less empty.</p>'+
      '<div class="stats">depth '+(game.level+1)+' of 5</div>'+
      '<button class="pill primary" id="nextBtn">Keep descending</button>');
    bindBtn('nextBtn',function(){
      EH.startLevel(game,game.level+1);
      ui='play'; hideOv(); levelIntro();
    });
  }

  /* ---------- event drain ---------- */
  function drainEvents(st,silent){
    for(var i=0;i<st.events.length;i++){
      var ev=st.events[i];
      if(!silent)switch(ev.type){
        case 'ping': S.ping(); vib(10); break;
        case 'echo': S.echo(ev); break;
        case 'click': S.click(ev); break;
        case 'worm': S.worm(); break;
        case 'pulse': S.pulse(ev); break;
        case 'foot': S.foot(); break;
        case 'hum': S.hum(ev); break;
        case 'frenzy': S.frenzy(ev); break;
        case 'scream': S.scream(ev); vib(40); break;
        case 'sweepHit': S.sweep(); vib(30); break;
        case 'death': S.death(); vib(60); break;
        case 'clear': S.clear(); break;
      }
    }
    st.events.length=0;
  }

  /* ---------- rendering ---------- */
  function rippleColor(kind){
    switch(kind){
      case 'ping': return [130,235,255];
      case 'foot': return [110,190,210];
      case 'click': return [230,190,120];
      case 'echo': return [90,180,205];
      case 'hum': return [140,240,190];
      case 'scream': return [255,150,90];
      case 'death': return [255,70,80];
      default: return [130,235,255];
    }
  }
  function render(st,now,camx,camy){
    ctx.fillStyle='#050508';
    ctx.fillRect(0,0,vw,vh);
    ctx.save();
    ctx.translate(-camx,-camy);
    var i,j,L=st.L;

    // --- wall segments, alpha-bucketed for speed ---
    var NB=12,buckets=new Array(NB),fresh=null;
    var minx=camx-40,maxx=camx+vw+40,miny=camy-40,maxy=camy+vh+40;
    for(i=0;i<L.segs.length;i++){
      var sg=L.segs[i];
      if(sg.mx<minx||sg.mx>maxx||sg.my<miny||sg.my>maxy)continue;
      var age=now-sg.lit;
      if(age<0||age>=EH.FADE)continue;
      var a=1-age/EH.FADE; a=a*a;
      var b=Math.min(NB-1,(a*NB)|0);
      if(!buckets[b])buckets[b]=new Path2D();
      buckets[b].moveTo(sg.x1,sg.y1);
      buckets[b].lineTo(sg.x2,sg.y2);
      if(age<0.3){
        if(!fresh)fresh=new Path2D();
        fresh.moveTo(sg.x1,sg.y1);
        fresh.lineTo(sg.x2,sg.y2);
      }
    }
    ctx.lineWidth=1.6;
    for(i=0;i<NB;i++){
      if(!buckets[i])continue;
      var al=(i+0.5)/NB;
      ctx.strokeStyle='rgba(90,215,240,'+(al*0.85).toFixed(3)+')';
      ctx.stroke(buckets[i]);
    }
    if(fresh){
      ctx.lineWidth=2.6;
      ctx.strokeStyle='rgba(200,250,255,0.85)';
      ctx.stroke(fresh);
      ctx.lineWidth=1.6;
    }

    // --- ripples (wavefronts) ---
    for(i=0;i<st.ripples.length;i++){
      var rp=st.ripples[i];
      if(rp.r<=0)continue;
      var col=rippleColor(rp.kind);
      var fade=Math.max(0,1-rp.r/rp.maxR);
      var base=(rp.kind==='ping'?0.55:(rp.kind==='scream'||rp.kind==='death'?0.7:0.4));
      ctx.strokeStyle='rgba('+col[0]+','+col[1]+','+col[2]+','+(fade*base).toFixed(3)+')';
      ctx.lineWidth=rp.kind==='ping'?2:(rp.kind==='scream'||rp.kind==='death'?3:1.2);
      ctx.beginPath(); ctx.arc(rp.ox,rp.oy,rp.r,0,Math.PI*2); ctx.stroke();
      if(rp.kind==='ping'||rp.kind==='scream'){ // second harmonic
        ctx.strokeStyle='rgba('+col[0]+','+col[1]+','+col[2]+','+(fade*base*0.45).toFixed(3)+')';
        ctx.lineWidth=1;
        ctx.beginPath(); ctx.arc(rp.ox,rp.oy,rp.r*0.72,0,Math.PI*2); ctx.stroke();
      }
    }

    // --- glowworms ---
    for(i=0;i<L.worms.length;i++){
      var w=L.worms[i];
      if(!w.alive)continue;
      var pT=now-w.pulseT;
      if(pT>=0&&pT<1.5){ // free light
        var pa=(1-pT/1.5);
        var gr=ctx.createRadialGradient(w.x,w.y,2,w.x,w.y,64);
        gr.addColorStop(0,'rgba(180,255,170,'+(0.5*pa).toFixed(3)+')');
        gr.addColorStop(1,'rgba(120,230,140,0)');
        ctx.fillStyle=gr;
        ctx.beginPath(); ctx.arc(w.x,w.y,64,0,Math.PI*2); ctx.fill();
      }
      var wa=Math.max(EH.segAlpha(w.lit,now),pT>=0&&pT<1.5?0.9:0);
      if(wa>0){
        ctx.fillStyle='rgba(190,255,180,'+(wa*0.95).toFixed(3)+')';
        ctx.beginPath(); ctx.arc(w.x,w.y,4.5,0,Math.PI*2); ctx.fill();
      }
    }

    // --- exit shaft ---
    var E=L.exit;
    if(E.discovered){
      var unlocked=st.worms>=L.quota;
      var ea=0.28+0.14*Math.sin(now*2.2)+(unlocked?0.25:0);
      ctx.strokeStyle='rgba(150,245,200,'+ea.toFixed(3)+')';
      ctx.lineWidth=1.4;
      for(j=0;j<3;j++){
        ctx.beginPath();
        ctx.arc(E.x,E.y,8+j*8,0,Math.PI*2);
        ctx.stroke();
      }
      if(unlocked){
        ctx.fillStyle='rgba(170,255,215,0.75)';
        ctx.font='9px ui-monospace,monospace';
        ctx.textAlign='center';
        ctx.fillText('EXIT',E.x,E.y-32);
      }
    }else{
      var xa=EH.segAlpha(E.lit,now);
      if(xa>0){
        ctx.strokeStyle='rgba(150,245,200,'+(xa*0.7).toFixed(3)+')';
        ctx.beginPath(); ctx.arc(E.x,E.y,14,0,Math.PI*2); ctx.stroke();
      }
    }

    // --- stalkers ---
    for(i=0;i<L.stalkers.length;i++){
      var s=L.stalkers[i];
      if(!s.alive)continue;
      var sa=EH.segAlpha(s.lit,now);
      if(s.state==='dormant')sa*=0.45;
      if(sa<=0.01)continue;
      var cr=s.state==='frenzy'?'255,90,100':(s.state==='alerted'?'235,180,140':'170,190,215');
      ctx.strokeStyle='rgba('+cr+','+sa.toFixed(3)+')';
      ctx.fillStyle='rgba('+cr+','+(sa*0.25).toFixed(3)+')';
      ctx.lineWidth=1.6;
      ctx.beginPath(); ctx.arc(s.x,s.y,11,0,Math.PI*2); ctx.fill(); ctx.stroke();
      // legs
      ctx.beginPath();
      for(j=0;j<5;j++){
        var la=j/5*Math.PI*2+now*0.3;
        ctx.moveTo(s.x+Math.cos(la)*11,s.y+Math.sin(la)*11);
        ctx.lineTo(s.x+Math.cos(la)*19,s.y+Math.sin(la)*19);
      }
      ctx.stroke();
    }

    // --- screamer ---
    if(L.screamer){
      var scr=L.screamer,ka=EH.segAlpha(scr.lit,now);
      if(ka>0.01){
        ctx.strokeStyle='rgba(255,170,90,'+ka.toFixed(3)+')';
        ctx.lineWidth=2;
        ctx.beginPath(); ctx.arc(scr.x,scr.y,16,0,Math.PI*2); ctx.stroke();
        ctx.beginPath();
        for(j=0;j<8;j++){
          var sa2=j/8*Math.PI*2;
          ctx.moveTo(scr.x+Math.cos(sa2)*16,scr.y+Math.sin(sa2)*16);
          ctx.lineTo(scr.x+Math.cos(sa2)*26,scr.y+Math.sin(sa2)*26);
        }
        ctx.stroke();
      }
    }

    // --- matriarch: her sweeping sonar cone IS light ---
    if(L.matriarch){
      var M=L.matriarch;
      ctx.fillStyle='rgba(190,110,255,0.055)';
      ctx.beginPath();
      ctx.moveTo(M.x,M.y);
      ctx.arc(M.x,M.y,M.coneR,M.ang-M.coneHalf,M.ang+M.coneHalf);
      ctx.closePath(); ctx.fill();
      ctx.strokeStyle='rgba(200,130,255,0.16)';
      ctx.lineWidth=1;
      ctx.stroke();
      var ma=Math.max(0.22,EH.segAlpha(M.lit,now));
      ctx.strokeStyle='rgba(210,140,255,'+ma.toFixed(3)+')';
      ctx.lineWidth=2.4;
      ctx.beginPath(); ctx.arc(M.x,M.y,34,0,Math.PI*2); ctx.stroke();
      ctx.beginPath(); ctx.arc(M.x,M.y,22,0,Math.PI*2); ctx.stroke();
    }

    // --- player: faint self-knowledge ---
    var pg=ctx.createRadialGradient(st.px,st.py,1,st.px,st.py,26);
    pg.addColorStop(0,'rgba(160,240,255,0.4)');
    pg.addColorStop(1,'rgba(160,240,255,0)');
    ctx.fillStyle=pg;
    ctx.beginPath(); ctx.arc(st.px,st.py,26,0,Math.PI*2); ctx.fill();
    ctx.fillStyle='rgba(220,250,255,0.85)';
    ctx.beginPath(); ctx.arc(st.px,st.py,3.4,0,Math.PI*2); ctx.fill();

    ctx.restore();

    // vignette
    var vg=ctx.createRadialGradient(vw/2,vh/2,Math.min(vw,vh)*0.28,vw/2,vh/2,Math.max(vw,vh)*0.72);
    vg.addColorStop(0,'rgba(0,0,0,0)');
    vg.addColorStop(1,'rgba(2,2,5,0.82)');
    ctx.fillStyle=vg;
    ctx.fillRect(0,0,vw,vh);

    // death red flash
    if(deathTimer>0){
      ctx.fillStyle='rgba(180,20,30,'+(deathTimer*0.35).toFixed(3)+')';
      ctx.fillRect(0,0,vw,vh);
    }
    // ping cooldown ghost (very subtle)
    if(st.pingCd>0&&ui==='play'){
      ctx.strokeStyle='rgba(120,220,240,0.12)';
      ctx.lineWidth=2;
      ctx.beginPath();
      ctx.arc(vw/2,vh/2,20,-Math.PI/2,-Math.PI/2+(1-st.pingCd/EH.PING_CD)*Math.PI*2);
      ctx.stroke();
    }
  }

  function updateHUD(){
    var h='';
    for(var i=0;i<3;i++)h+=i<game.hearts?'♥':'♡';
    var txt='<span>DEPTH '+game.level+'</span>'+
            '<span>✦ '+game.worms+'/'+(game.L?game.L.quota:0)+'</span>'+
            '<span class="hearts">'+h+'</span>'+
            (game.worms>=(game.L?game.L.quota:99)?'<span style="color:#7fd9a8">FIND THE SHAFT</span>':'');
    if(txt!==lastHudText){ hud.innerHTML=txt; lastHudText=txt; }
  }

  /* ---------- heartbeat proximity ---------- */
  function heartbeat(dt){
    if(ui!=='play')return;
    var L=game.L,best=1e9,i;
    for(i=0;i<L.stalkers.length;i++){
      var s=L.stalkers[i];
      if(!s.alive)continue;
      var d=EH.dist(game.px,game.py,s.x,s.y);
      if(d<best)best=d;
    }
    if(L.matriarch){
      var md=EH.dist(game.px,game.py,L.matriarch.x,L.matriarch.y);
      if(md<best)best=md;
    }
    if(best<340){
      var interval=0.32+0.9*(best/340);
      hbT-=dt;
      if(hbT<=0){
        hbT=interval;
        S.heart(best<140);
        if(best<140)vib(30);
      }
    }else hbT=0.2;
  }

  /* ---------- main loop ---------- */
  var lastT=performance.now();
  function frame(t){
    requestAnimationFrame(frame);
    var dt=Math.min(0.05,(t-lastT)/1000);
    lastT=t;
    var st=null;

    if(ui==='title'&&demo){
      demoPingT-=dt;
      var dp=false;
      if(demoPingT<=0){ demoPingT=2.8; dp=true; demo.pingCd=0; }
      EH.update(demo,dt,{ping:dp});
      if(demo.phase!=='play'){ EH.startLevel(demo,1); }
      drainEvents(demo,true);
      st=demo;
    }else if(ui==='play'){
      EH.update(game,dt,readInput());
      drainEvents(game,false);
      heartbeat(dt);
      updateDrone(dt);
      if(game.phase==='dead'||game.phase==='over'){
        deathTimer=1.0; ui='deathwait';
      }else if(game.phase==='clear'){
        clearTimer=0.8; ui='clearwait';
      }
      st=game;
    }else if(ui==='deathwait'){
      EH.update(game,dt,{}); // let ripples play out
      deathTimer-=dt;
      if(deathTimer<=0){
        deathTimer=0;
        if(game.phase==='over')endRun(false); else showDead();
        ui=(game.phase==='over')?'over':'dead';
      }
      st=game;
    }else if(ui==='clearwait'){
      EH.update(game,dt,{});
      clearTimer-=dt;
      if(clearTimer<=0){ showClear(); ui=(game.level>=5)?'victory':'clear'; }
      st=game;
    }else{
      st=(ui==='pause'||ui==='dead'||ui==='clear'||ui==='over'||ui==='victory')?game:demo;
      if(st)EH.update(st,0,{}); // freeze but keep valid
    }

    if(st&&st.L){
      var camx=EH.clamp(st.px-vw/2,-80,Math.max(-80,st.L.w-vw+80));
      var camy=EH.clamp(st.py-vh/2,-80,Math.max(-80,st.L.h-vh+80));
      if(st.L.w<vw)camx=(st.L.w-vw)/2;
      if(st.L.h<vh)camy=(st.L.h-vh)/2;
      render(st,st.time,camx,camy);
    }
    if(ui==='play'||ui==='deathwait'||ui==='clearwait')updateHUD();
    else if(ui==='title'&&lastHudText!==''){hud.innerHTML='';lastHudText='';}
  }

  showTitle();
  requestAnimationFrame(frame);
})();
</script>
