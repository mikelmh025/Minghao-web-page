  html,body { height:100%; overflow:hidden; background:#12121a; touch-action:none; overscroll-behavior:none;
    font-family:-apple-system,BlinkMacSystemFont,"Segoe UI",Roboto,Helvetica,Arial,sans-serif; color:#e8e8f0;
    -webkit-user-select:none; user-select:none; -webkit-tap-highlight-color:transparent; }
  canvas { display:block; position:fixed; inset:0; }
  .pill { display:inline-block; border:1px solid rgba(255,255,255,.18); background:rgba(30,30,44,.82);
    color:#e8e8f0; border-radius:999px; padding:8px 16px; font-size:14px; font-weight:600; cursor:pointer;
    text-decoration:none; backdrop-filter:blur(6px); }
  .pill:active { background:rgba(70,70,96,.9); }
  #topbar { position:fixed; top:calc(10px + env(safe-area-inset-top)); right:calc(10px + env(safe-area-inset-right));

  .overlay { position:fixed; inset:0; z-index:30; display:flex; flex-direction:column; align-items:center;
    justify-content:center; gap:14px; background:rgba(10,10,18,.86); backdrop-filter:blur(4px); text-align:center; padding:20px; }
  .overlay[hidden] { display:none; }
  .overlay h1 { font-size:min(11vw,54px); letter-spacing:2px; color:#c8f5c0;
    text-shadow:0 0 24px rgba(120,255,120,.35), 0 3px 0 #1a3a1a; }
  .overlay h2 { font-size:32px; color:#ff6b6b; letter-spacing:3px; }
  .overlay p { color:#9a9ab0; font-size:15px; max-width:460px; line-height:1.55; }
  .overlay .big { padding:14px 44px; font-size:18px; background:#2e7d4f; border-color:#4caf7a; }
  .overlay .big:active { background:#3a9d63; }
  #stats { display:grid; grid-template-columns:auto auto; gap:6px 22px; font-size:16px; margin:6px 0; }
  #stats span:nth-child(odd){ color:#9a9ab0; text-align:right; }

  .best { color:#f5d76e !important; font-size:14px; }
  kbd { background:#26263a; border:1px solid #3a3a55; border-radius:5px; padding:1px 7px; font-size:12px;
    font-family:inherit; color:#cfcfe6; }

  .ticketLine { color:#22d3ee; font-weight:700; margin:4px 0; animation:ticketPulse 1.1s ease-in-out infinite; }
  @keyframes luckyPop { 0%{transform:scale(.3);opacity:0} 60%{transform:scale(1.25)} 100%{transform:scale(1);opacity:1} }
  @keyframes ticketPulse { 0%,100%{opacity:1;text-shadow:0 0 4px #22d3ee} 50%{opacity:.65;text-shadow:0 0 16px #22d3ee} }
  .vaultLink { display:inline-block; margin-top:10px; color:#c9a6ff; font-size:13px; text-decoration:none;
    border:1px solid rgba(201,166,255,.45); border-radius:999px; padding:5px 14px; }
  .vaultLink:active, .vaultLink:hover { background:rgba(201,166,255,.12); }
</style>

  <kbd>WASD</kbd>/<kbd>←↑↓→</kbd> move &nbsp;•&nbsp; mouse aims, hold to fire &nbsp;•&nbsp; <kbd>Q</kbd>/<kbd>1-5</kbd> weapons &nbsp;•&nbsp; <kbd>P</kbd> pause<br>
  Touch: left thumb moves, right thumb aims &amp; fires.</p>

<script src="../../lib/anime.min.js"></script>
<script>
'use strict';
/* ================================================================
   ZOMBIE NIGHTS — sim core (DOM-free) + render/UI layer
   ================================================================ */

var ARENA_W = 1600, ARENA_H = 1200;

var WEAPONS = {
  pistol:      { name:'PISTOL',       dmg:26, rate:3.5,  speed:720,  spread:0.03, pellets:1, life:1.2,  pierce:0, ammo:Infinity, flame:false },
  smg:         { name:'SMG',          dmg:13, rate:11,   speed:760,  spread:0.11, pellets:1, life:1.0,  pierce:0, ammo:160, flame:false },
  shotgun:     { name:'SHOTGUN',      dmg:12, rate:1.4,  speed:640,  spread:0.30, pellets:7, life:0.38, pierce:0, ammo:28, flame:false },
  rifle:       { name:'RIFLE',        dmg:62, rate:2.2,  speed:1050, spread:0.01, pellets:1, life:1.4,  pierce:3, ammo:36, flame:false },
  flamethrower:{ name:'FLAMETHROWER', dmg:4,  rate:24,   speed:330,  spread:0.34, pellets:1, life:0.34, pierce:0, ammo:240, flame:true },
};
var WEAPON_ORDER = ['pistol','smg','shotgun','rifle','flamethrower'];

var ZTYPES = {
  walker:   { hp:42,  speed:56,  dmg:10, r:13, score:10, atk:0.9 },
  runner:   { hp:24,  speed:138, dmg:8,  r:11, score:15, atk:0.8 },
  brute:    { hp:230, speed:44,  dmg:24, r:22, score:50, atk:1.2, knock:210 },
  spitter:  { hp:36,  speed:62,  dmg:8,  r:13, score:25, atk:1.0, range:430, keep:300, spitCd:2.4 },
  exploder: { hp:32,  speed:118, dmg:0,  r:12, score:30, atk:1.0, blastR:85, blastP:38, blastZ:80 },
  boss:     { hp:1400, speed:40, dmg:34, r:39, score:500, atk:1.4, knock:300 },
};

function clamp(v, a, b){ return v < a ? a : (v > b ? b : v); }
function dist2(ax, ay, bx, by){ var dx = ax-bx, dy = ay-by; return dx*dx + dy*dy; }

function makeObstacles(){
  return {
    rects: [
      { x:290,  y:240, w:126, h:56,  type:'car', hue:210 },
      { x:1140, y:210, w:126, h:56,  type:'car', hue:2   },
      { x:240,  y:830, w:56,  h:126, type:'car', hue:130 },
      { x:1240, y:870, w:126, h:56,  type:'car', hue:45  },
      { x:690,  y:940, w:126, h:56,  type:'car', hue:280 },
      { x:1360, y:560, w:56,  h:126, type:'car', hue:190 },
      { x:552,  y:412, w:44,  h:44,  type:'crate' },
      { x:600,  y:412, w:44,  h:44,  type:'crate' },
      { x:576,  y:366, w:44,  h:44,  type:'crate' },
      { x:1000, y:690, w:44,  h:44,  type:'crate' },
      { x:960,  y:296, w:44,  h:44,  type:'crate' },
      { x:392,  y:614, w:44,  h:44,  type:'crate' },
    ],
    barrels: [
      { x:500,  y:300, r:14, hp:30, dead:false },
      { x:1200, y:490, r:14, hp:30, dead:false },
      { x:860,  y:830, r:14, hp:30, dead:false },
      { x:300,  y:500, r:14, hp:30, dead:false },
      { x:1340, y:290, r:14, hp:30, dead:false },
      { x:650,  y:710, r:14, hp:30, dead:false },
    ],
  };
}

function createSim(opts){
  opts = opts || {};
  return {
    t:0, over:false,
    wave:0, phase:'intermission', phaseT: (opts.firstDelay != null ? opts.firstDelay : 2.6),
    toSpawn:[], spawnT:0, spawnGap:1,
    player:{
      x:ARENA_W/2, y:ARENA_H/2, r:14, hp:100, maxHp:100, speed:225,
      invuln:0, noDmgT:99, angle:0, fireCd:0, muzzleT:0,
      weapon:'pistol', ammo:{ pistol:Infinity, smg:0, shotgun:0, rifle:0, flamethrower:0 },
      vx:0, vy:0, kbx:0, kby:0,
    },
    zombies:[], bullets:[], globs:[], pickups:[], beacons:[], corpses:[],
    turrets:[], shocks:[],
    airdropT: (opts.airdropT != null ? opts.airdropT : 20),
    score:0, kills:0, shots:0, hits:0, streak:0, streakT:0,
    obstacles: makeObstacles(),
    events:[], zid:1,
    rng: opts.rng || Math.random,
    dropChance: (opts.dropChance != null ? opts.dropChance : 0.08),
  };
}

function comboMult(S){ return Math.min(5, 1 + Math.floor(S.streak / 4)); }

/* ---------- collision helpers ---------- */
function circleRectHit(cx, cy, cr, R){
  var nx = clamp(cx, R.x, R.x + R.w), ny = clamp(cy, R.y, R.y + R.h);
  return dist2(cx, cy, nx, ny) < cr*cr;
}
function collideCircle(S, e, r){
  // arena bounds
  e.x = clamp(e.x, r, ARENA_W - r);
  e.y = clamp(e.y, r, ARENA_H - r);
  var i, R, b;
  var rects = S.obstacles.rects;
  for (i = 0; i < rects.length; i++){
    R = rects[i];
    if (!circleRectHit(e.x, e.y, r, R)) continue;
    var nx = clamp(e.x, R.x, R.x + R.w), ny = clamp(e.y, R.y, R.y + R.h);
    var dx = e.x - nx, dy = e.y - ny;
    var d = Math.sqrt(dx*dx + dy*dy);
    if (d < 0.0001){ // center inside rect: push out along smallest axis
      var l = e.x - R.x, rr = R.x + R.w - e.x, tp = e.y - R.y, bt = R.y + R.h - e.y;
      var m = Math.min(l, rr, tp, bt);
      if (m === l) e.x = R.x - r; else if (m === rr) e.x = R.x + R.w + r;
      else if (m === tp) e.y = R.y - r; else e.y = R.y + R.h + r;
    } else {
      e.x = nx + dx / d * r; e.y = ny + dy / d * r;
    }
  }
  var barrels = S.obstacles.barrels;
  for (i = 0; i < barrels.length; i++){
    b = barrels[i];
    if (b.dead) continue;
    var bx = e.x - b.x, by = e.y - b.y, rd = r + b.r;
    var d2 = bx*bx + by*by;
    if (d2 < rd*rd && d2 > 0.0001){
      var dd = Math.sqrt(d2);
      e.x = b.x + bx / dd * rd; e.y = b.y + by / dd * rd;
    }
  }
}
function pointBlocked(S, x, y){
  var rects = S.obstacles.rects;
  for (var i = 0; i < rects.length; i++){
    var R = rects[i];
    if (x > R.x && x < R.x + R.w && y > R.y && y < R.y + R.h) return true;
  }
  return false;
}

/* ---------- waves ---------- */
function buildWave(S){
  var w = S.wave;
  var count = 6 + w * 3;
  var surge = (w % 5 === 0);
  if (surge) count = Math.round(count * 1.8);
  var hpMul = 1 + 0.12 * (w - 1);
  S.toSpawn = [];
  for (var i = 0; i < count; i++){
    var r = S.rng(), type = 'walker';
    if      (w >= 5 && r < 0.10) type = 'brute';
    else if (w >= 4 && r < 0.22) type = 'exploder';
    else if (w >= 3 && r < 0.36) type = 'spitter';
    else if (w >= 2 && r < 0.62) type = 'runner';
    S.toSpawn.push({ type:type, hpMul:hpMul });
  }
  // every 5th wave a boss brute leads the horde (pop() spawns from the end)
  if (surge) S.toSpawn.push({ type:'boss', hpMul: 1 + 0.35 * (w / 5 - 1) });
  var dur = surge ? 24 : 20;
  S.spawnGap = dur / count;
  S.spawnT = 0.3;
  S.surge = surge;
}

function spawnZombie(S, spec, fx, fy){
  var t = ZTYPES[spec.type];
  var x, y;
  if (fx != null){ x = fx; y = fy; }
  else {
    var side = Math.floor(S.rng() * 4);
    if (side === 0){ x = 20; y = S.rng() * ARENA_H; }
    else if (side === 1){ x = ARENA_W - 20; y = S.rng() * ARENA_H; }
    else if (side === 2){ x = S.rng() * ARENA_W; y = 20; }
    else { x = S.rng() * ARENA_W; y = ARENA_H - 20; }
  }
  var z = {
    id: S.zid++, type: spec.type, x:x, y:y, r:t.r,
    hp: t.hp * (spec.hpMul || 1), maxHp: t.hp * (spec.hpMul || 1),
    speed: t.speed * (0.88 + S.rng() * 0.24),
    atkCd: 0, spitCd: 1 + S.rng() * 1.5, hitT: 0,
    burnT: 0, wob: S.rng() * 6.28, kbx:0, kby:0,
    lastD: Infinity, stuckT: 0, detourT: 0, detourDir: S.rng() < 0.5 ? -1 : 1,
  };
  if (spec.type === 'boss'){ z.slamCd = 3.2; z.slamT = 0; }
  S.zombies.push(z);
  return z;
}

/* ---------- combat ---------- */
function damagePlayer(S, dmg, kx, ky, kforce){
  var P = S.player;
  if (S.over || P.invuln > 0) return false;
  P.hp -= dmg;
  P.invuln = 0.6;
  P.noDmgT = 0;
  if (kforce){ P.kbx += kx * kforce; P.kby += ky * kforce; }
  S.events.push({ type:'hurt', dmg:dmg });
  if (P.hp <= 0){
    P.hp = 0;
    S.over = true;
    S.events.push({ type:'gameover' });
  }
  return true;
}

function damageZombie(S, z, dmg, hx, hy){
  z.hp -= dmg;
  z.hitT = 0.12;
  S.events.push({ type:'zhit', x: hx != null ? hx : z.x, y: hy != null ? hy : z.y, dmg:dmg });
}

function killZombie(S, z){
  var t = ZTYPES[z.type];
  S.kills++;
  S.streak++;
  S.streakT = 3;
  var gained = t.score * comboMult(S);
  S.score += gained;
  S.corpses.push({ x:z.x, y:z.y, r:z.r, type:z.type, t:5, max:5 });
  S.events.push({ type:'zdie', x:z.x, y:z.y, r:z.r, ztype:z.type, gained:gained, mult:comboMult(S) });
  if (z.type === 'boss'){
    // weapon crate + coin shower
    S.pickups.push({ x:z.x, y:z.y, weapon:WEAPON_ORDER[1 + Math.floor(S.rng() * 4)], t:30 });
    S.events.push({ type:'bossdie', x:z.x, y:z.y });
  } else if (z.type === 'exploder'){
    explode(S, z.x, z.y, t.blastR, t.blastZ, t.blastP, z.id);
  } else if (S.rng() < S.dropChance){
    if (S.rng() < 0.14){
      S.pickups.push({ x:z.x, y:z.y, turret:true, t:18 });
    } else {
      var w = WEAPON_ORDER[1 + Math.floor(S.rng() * 4)];
      S.pickups.push({ x:z.x, y:z.y, weapon:w, t:18 });
    }
  }
}

function deployTurret(S, x, y){
  S.turrets.push({ x:x, y:y, t:20, cd:0.5, angle:0, muzzleT:0 });
  S.events.push({ type:'turretup', x:x, y:y });
}

function explode(S, x, y, radius, dmgZ, dmgP, ignoreId){
  S.events.push({ type:'explosion', x:x, y:y, r:radius });
  var i, r2 = radius * radius;
  for (i = 0; i < S.zombies.length; i++){
    var z = S.zombies[i];
    if (z.id === ignoreId) continue;
    var d2 = dist2(x, y, z.x, z.y);
    if (d2 < r2){
      var f = 1 - Math.sqrt(d2) / radius * 0.6;
      damageZombie(S, z, dmgZ * f);
      var d = Math.sqrt(d2) || 1;
      z.kbx += (z.x - x) / d * 260; z.kby += (z.y - y) / d * 260;
    }
  }
  var P = S.player;
  var pd2 = dist2(x, y, P.x, P.y);
  if (pd2 < r2){
    var pd = Math.sqrt(pd2) || 1;
    damagePlayer(S, dmgP * (1 - pd / radius * 0.5), (P.x - x) / pd, (P.y - y) / pd, 200);
  }
  // chain barrels
  var barrels = S.obstacles.barrels;
  for (i = 0; i < barrels.length; i++){
    var b = barrels[i];
    if (!b.dead && dist2(x, y, b.x, b.y) < r2){
      b.hp -= 100;
    }
  }
}

function giveWeapon(S, weapon, silent){
  var w = WEAPONS[weapon];
  if (!w) return;
  if (weapon !== 'pistol') S.player.ammo[weapon] = Math.min(w.ammo * 2, (S.player.ammo[weapon] || 0) + w.ammo);
  S.player.weapon = weapon;
  if (!silent) S.events.push({ type:'pickup', weapon:weapon, x:S.player.x, y:S.player.y });
}

function ownedWeapons(S){
  var out = [];
  for (var i = 0; i < WEAPON_ORDER.length; i++){
    var k = WEAPON_ORDER[i];
    if (k === 'pistol' || S.player.ammo[k] > 0) out.push(k);
  }
  return out;
}
function cycleWeapon(S){
  var own = ownedWeapons(S);
  var i = own.indexOf(S.player.weapon);
  S.player.weapon = own[(i + 1) % own.length];
  S.events.push({ type:'swap' });
}

function fireWeapon(S, aim){
  var P = S.player, w = WEAPONS[P.weapon];
  if (P.weapon !== 'pistol'){
    if (P.ammo[P.weapon] <= 0){ P.weapon = 'pistol'; w = WEAPONS.pistol; }
    else {
      P.ammo[P.weapon]--;
      if (P.ammo[P.weapon] <= 0){ /* fire this last round, then swap after */ }
    }
  }
  P.fireCd = 1 / w.rate;
  P.muzzleT = w.flame ? 0.1 : 0.07;
  var ox = P.x + Math.cos(aim) * (P.r + 8), oy = P.y + Math.sin(aim) * (P.r + 8);
  for (var i = 0; i < w.pellets; i++){
    var a = aim + (S.rng() - 0.5) * 2 * w.spread;
    var sp = w.speed * (w.pellets > 1 || w.flame ? (0.85 + S.rng() * 0.3) : 1);
    S.bullets.push({
      x:ox, y:oy, vx:Math.cos(a) * sp, vy:Math.sin(a) * sp,
      dmg:w.dmg, life:w.life, pierce:w.pierce, flame:w.flame, hitIds:null, counted:false,
    });
    S.shots++;
  }
  S.events.push({ type:'shot', weapon:P.weapon, x:ox, y:oy, a:aim });
  if (P.weapon !== 'pistol' && P.ammo[P.weapon] <= 0){
    P.weapon = 'pistol';
    S.events.push({ type:'empty' });
  }
}

/* ---------- main update ---------- */
function simUpdate(S, dt, input){
  dt = Math.min(dt || 0, 0.05);
  if (dt <= 0) return;
  S.t += dt;
  if (S.over) return;
  input = input || {};
  var P = S.player, i, j, z;

  /* wave state machine */
  if (S.phase === 'intermission'){
    S.phaseT -= dt;
    if (S.phaseT <= 0){
      S.wave++;
      buildWave(S);
      S.phase = 'wave';
      S.events.push({ type:'wave', n:S.wave, surge:S.surge });
    }
  } else {
    if (S.toSpawn.length){
      S.spawnT -= dt;
      while (S.spawnT <= 0 && S.toSpawn.length){
        spawnZombie(S, S.toSpawn.pop());
        S.spawnT += S.spawnGap;
      }
    } else if (S.zombies.length === 0){
      S.phase = 'intermission';
      S.phaseT = 4.5;
      S.score += 50 * S.wave;
      S.events.push({ type:'waveclear', n:S.wave, bonus:50 * S.wave });
    }
  }

  /* player movement */
  var mx = input.mx || 0, my = input.my || 0;
  var ml = Math.sqrt(mx*mx + my*my);
  if (ml > 1){ mx /= ml; my /= ml; }
  P.x += (mx * P.speed + P.kbx) * dt;
  P.y += (my * P.speed + P.kby) * dt;
  P.kbx *= Math.pow(0.02, dt); P.kby *= Math.pow(0.02, dt);
  collideCircle(S, P, P.r);
  if (typeof input.aim === 'number' && isFinite(input.aim)) P.angle = input.aim;

  /* firing */
  P.fireCd -= dt;
  P.muzzleT -= dt;
  if (input.fire && P.fireCd <= 0) fireWeapon(S, P.angle);

  /* regen + invuln */
  P.invuln -= dt;
  P.noDmgT += dt;
  if (P.noDmgT >= 5 && P.hp < P.maxHp) P.hp = Math.min(P.maxHp, P.hp + 4 * dt);

  /* combo decay */
  if (S.streakT > 0){ S.streakT -= dt; if (S.streakT <= 0) S.streak = 0; }

  /* bullets */
  for (i = S.bullets.length - 1; i >= 0; i--){
    var b = S.bullets[i];
    b.x += b.vx * dt; b.y += b.vy * dt;
    b.life -= dt;
    var dead = b.life <= 0 || b.x < 0 || b.x > ARENA_W || b.y < 0 || b.y > ARENA_H;
    if (!dead && pointBlocked(S, b.x, b.y)){
      dead = true;
      S.events.push({ type:'spark', x:b.x, y:b.y });
    }
    if (!dead){
      var barrels = S.obstacles.barrels;
      for (j = 0; j < barrels.length; j++){
        var br = barrels[j];
        if (!br.dead && dist2(b.x, b.y, br.x, br.y) < (br.r + 3) * (br.r + 3)){
          br.hp -= b.dmg;
          dead = true;
          S.events.push({ type:'spark', x:b.x, y:b.y });
          break;
        }
      }
    }
    if (!dead){
      for (j = 0; j < S.zombies.length; j++){
        z = S.zombies[j];
        if (z.hp <= 0) continue;
        if (b.hitIds && b.hitIds.indexOf(z.id) >= 0) continue;
        var rr = z.r + 4;
        if (dist2(b.x, b.y, z.x, z.y) < rr * rr){
          damageZombie(S, z, b.dmg, b.x, b.y);
          if (!b.counted){ S.hits++; b.counted = true; }
          if (b.flame){ z.burnT = 2.2; }
          var kd = Math.sqrt(b.vx*b.vx + b.vy*b.vy) || 1;
          z.kbx += b.vx / kd * (b.flame ? 20 : 70);
          z.kby += b.vy / kd * (b.flame ? 20 : 70);
          if (b.pierce > 0){
            b.pierce--;
            (b.hitIds || (b.hitIds = [])).push(z.id);
          } else dead = true;
          break;
        }
      }
    }
    if (dead) S.bullets.splice(i, 1);
  }

  /* barrels explode */
  var barr = S.obstacles.barrels;
  for (i = 0; i < barr.length; i++){
    if (!barr[i].dead && barr[i].hp <= 0){
      barr[i].dead = true;
      explode(S, barr[i].x, barr[i].y, 92, 85, 34, -1);
    }
  }

  /* zombies */
  for (i = 0; i < S.zombies.length; i++){
    z = S.zombies[i];
    if (z.hp <= 0) continue;
    var t = ZTYPES[z.type];
    var dx = P.x - z.x, dy = P.y - z.y;
    var d = Math.sqrt(dx*dx + dy*dy) || 1;
    var ux = dx / d, uy = dy / d;
    z.wob += dt * 3;
    z.atkCd -= dt;

    /* burn DoT */
    if (z.burnT > 0){
      z.burnT -= dt;
      z.hp -= 11 * dt;
      if (S.rng() < dt * 8) S.events.push({ type:'burnpuff', x:z.x, y:z.y });
      if (z.hp <= 0) continue;
    }

    var want = 1;
    if (z.type === 'spitter'){
      if (d < t.keep) want = -0.7;
      else if (d < t.range) want = 0.15;
      z.spitCd -= dt;
      if (d < t.range && z.spitCd <= 0){
        z.spitCd = t.spitCd;
        S.globs.push({ x:z.x, y:z.y, vx:ux * 265, vy:uy * 265, life:2.2 });
        S.events.push({ type:'spit', x:z.x, y:z.y });
      }
    }
    /* boss ground slam: telegraphed windup, then expanding shockwave */
    if (z.type === 'boss'){
      if (z.slamT > 0){
        z.slamT -= dt;
        if (z.slamT <= 0){
          S.shocks.push({ x:z.x, y:z.y, r:z.r + 6, maxR:250, spd:340, hit:false });
          S.events.push({ type:'slam', x:z.x, y:z.y });
        }
      } else {
        z.slamCd -= dt;
        if (z.slamCd <= 0 && d < 230){
          z.slamCd = 6;
          z.slamT = 0.9;
          S.events.push({ type:'slamwarn', x:z.x, y:z.y });
        }
      }
    }
    // separation
    var sx = 0, sy = 0;
    for (j = 0; j < S.zombies.length; j++){
      if (j === i) continue;
      var o = S.zombies[j];
      var od2 = dist2(z.x, z.y, o.x, o.y);
      var minD = z.r + o.r + 2;
      if (od2 < minD * minD && od2 > 0.001){
        var od = Math.sqrt(od2);
        sx += (z.x - o.x) / od * (1 - od / minD);
        sy += (z.y - o.y) / od * (1 - od / minD);
      }
    }
    /* stuck detection: if no progress toward player, commit to a
       perpendicular detour so we walk around obstacles */
    z.stuckT += dt;
    if (z.stuckT >= 0.7){
      if (want > 0 && d > 60 && d > z.lastD - 12) z.detourT = 1.1;
      z.lastD = d;
      z.stuckT = 0;
    }
    var dirx = ux * want, diry = uy * want;
    if (z.detourT > 0 && want > 0){
      z.detourT -= dt;
      dirx = -uy * z.detourDir + ux * 0.2;
      diry =  ux * z.detourDir + uy * 0.2;
    }
    var wobx = Math.cos(z.wob) * 0.15, woby = Math.sin(z.wob * 1.3) * 0.15;
    var mspd = (z.type === 'boss' && z.slamT > 0) ? 0 : z.speed; // boss roots while winding up
    var vx = (dirx + sx * 0.9 + wobx) * mspd + z.kbx;
    var vy = (diry + sy * 0.9 + woby) * mspd + z.kby;
    z.kbx *= Math.pow(0.02, dt); z.kby *= Math.pow(0.02, dt);
    // axis-separated move for wall slide
    var px = z.x; z.x += vx * dt; collideCircle(S, z, z.r);
    var py = z.y; z.y += vy * dt; collideCircle(S, z, z.r);
    // hard-wedged (concave corner): flip detour side and nudge
    if (Math.abs(z.x - px) < 0.01 && Math.abs(z.y - py) < 0.01 && want > 0){
      z.detourDir *= -1;
      z.detourT = 1.1;
      z.x += -uy * z.detourDir * z.speed * dt;
      z.y +=  ux * z.detourDir * z.speed * dt;
      collideCircle(S, z, z.r);
    }

    /* melee / detonate */
    var reach = z.r + P.r + 3;
    if (d < reach + 2){
      if (z.type === 'exploder'){
        z.hp = 0; // will detonate via killZombie
        continue;
      }
      if (z.atkCd <= 0){
        z.atkCd = t.atk;
        if (damagePlayer(S, t.dmg, ux, uy, t.knock || 60)){
          S.events.push({ type:'bite', x:P.x, y:P.y });
        }
      }
    }
  }

  /* remove dead zombies */
  for (i = S.zombies.length - 1; i >= 0; i--){
    if (S.zombies[i].hp <= 0){
      killZombie(S, S.zombies[i]);
      S.zombies.splice(i, 1);
    }
  }

  /* acid globs */
  for (i = S.globs.length - 1; i >= 0; i--){
    var g = S.globs[i];
    g.x += g.vx * dt; g.y += g.vy * dt; g.life -= dt;
    var gdead = g.life <= 0 || pointBlocked(S, g.x, g.y) ||
      g.x < 0 || g.x > ARENA_W || g.y < 0 || g.y > ARENA_H;
    if (!gdead && dist2(g.x, g.y, P.x, P.y) < (P.r + 6) * (P.r + 6)){
      damagePlayer(S, 12, 0, 0, 0);
      gdead = true;
      S.events.push({ type:'acidhit', x:g.x, y:g.y });
    }
    if (gdead) S.globs.splice(i, 1);
  }

  /* boss shockwaves — an expanding ring the player must outrun/dodge */
  for (i = S.shocks.length - 1; i >= 0; i--){
    var sh = S.shocks[i];
    sh.r += sh.spd * dt;
    if (!sh.hit){
      var shd = Math.sqrt(dist2(sh.x, sh.y, P.x, P.y)) || 1;
      if (Math.abs(shd - sh.r) < P.r + 12){
        sh.hit = true;
        damagePlayer(S, 30, (P.x - sh.x) / shd, (P.y - sh.y) / shd, 340);
      }
    }
    if (sh.r >= sh.maxR) S.shocks.splice(i, 1);
  }

  /* pickups */
  for (i = S.pickups.length - 1; i >= 0; i--){
    var pk = S.pickups[i];
    pk.t -= dt;
    if (dist2(pk.x, pk.y, P.x, P.y) < 30 * 30){
      if (pk.turret) deployTurret(S, P.x, P.y);
      else giveWeapon(S, pk.weapon);
      S.pickups.splice(i, 1);
    } else if (pk.t <= 0) S.pickups.splice(i, 1);
  }

  /* turret buddies: auto-fire at nearest zombie for 20s, then power down */
  for (i = S.turrets.length - 1; i >= 0; i--){
    var tb = S.turrets[i];
    tb.t -= dt; tb.cd -= dt; tb.muzzleT -= dt;
    if (tb.t <= 0){
      S.events.push({ type:'turretdown', x:tb.x, y:tb.y });
      S.turrets.splice(i, 1);
      continue;
    }
    var bestZ = null, bestD = 420 * 420;
    for (j = 0; j < S.zombies.length; j++){
      var tz = S.zombies[j];
      if (tz.hp <= 0) continue;
      var td = dist2(tb.x, tb.y, tz.x, tz.y);
      if (td < bestD){ bestD = td; bestZ = tz; }
    }
    if (bestZ){
      tb.angle = Math.atan2(bestZ.y - tb.y, bestZ.x - tb.x);
      if (tb.cd <= 0){
        tb.cd = 0.18;
        tb.muzzleT = 0.06;
        var ta = tb.angle + (S.rng() - 0.5) * 0.08;
        S.bullets.push({
          x: tb.x + Math.cos(ta) * 14, y: tb.y + Math.sin(ta) * 14,
          vx: Math.cos(ta) * 700, vy: Math.sin(ta) * 700,
          dmg: 15, life: 0.9, pierce: 0, flame: false, hitIds: null, counted: true,
        });
        S.events.push({ type:'turretshot', x:tb.x, y:tb.y, a:ta });
      }
    }
  }

  /* airdrops */
  S.airdropT -= dt;
  if (S.airdropT <= 0){
    S.airdropT = 26;
    var bx2 = 0, by2 = 0, tries = 0;
    do {
      var ang = S.rng() * 6.283, rad = 220 + S.rng() * 240;
      bx2 = clamp(P.x + Math.cos(ang) * rad, 60, ARENA_W - 60);
      by2 = clamp(P.y + Math.sin(ang) * rad, 60, ARENA_H - 60);
      tries++;
    } while (pointBlocked(S, bx2, by2) && tries < 12);
    S.beacons.push({ x:bx2, y:by2, t:3, weapon:WEAPON_ORDER[1 + Math.floor(S.rng() * 4)],
      turret: S.rng() < 0.18 });
    S.events.push({ type:'beacon', x:bx2, y:by2 });
  }
  for (i = S.beacons.length - 1; i >= 0; i--){
    var bc = S.beacons[i];
    bc.t -= dt;
    if (bc.t <= 0){
      S.pickups.push({ x:bc.x, y:bc.y, weapon:bc.weapon, turret:bc.turret, t:30, air:true });
      S.events.push({ type:'drop', x:bc.x, y:bc.y });
      S.beacons.splice(i, 1);
    }
  }

  /* corpses fade */
  for (i = S.corpses.length - 1; i >= 0; i--){
    S.corpses[i].t -= dt;
    if (S.corpses[i].t <= 0) S.corpses.splice(i, 1);
  }
}

/* ---------- audio ---------- */
var AC = null, master = null, muted = false;
function audioInit(){
  if (AC) { if (AC.state === 'suspended') AC.resume(); return; }
  try {
    AC = new (window.AudioContext || window.webkitAudioContext)();
    master = AC.createGain();
    master.gain.value = muted ? 0 : 0.5;
    master.connect(AC.destination);
  } catch (e) { AC = null; }
}
var noiseBuf = null;
function getNoise(){
  if (noiseBuf || !AC) return noiseBuf;
  noiseBuf = AC.createBuffer(1, AC.sampleRate * 1, AC.sampleRate);
  var d = noiseBuf.getChannelData(0);
  for (var i = 0; i < d.length; i++) d[i] = Math.random() * 2 - 1;
  return noiseBuf;
}
function envGain(vol, dur){
  var g = AC.createGain();
  g.gain.setValueAtTime(vol, AC.currentTime);
  g.gain.exponentialRampToValueAtTime(0.001, AC.currentTime + dur);
  g.connect(master);
  return g;
}
function playNoise(vol, dur, type, freq, q){
  if (!AC || muted) return;
  var src = AC.createBufferSource(); src.buffer = getNoise(); src.loop = true;
  var f = AC.createBiquadFilter(); f.type = type; f.frequency.value = freq; f.Q.value = q || 0.8;
  var g = envGain(vol, dur);
  src.connect(f); f.connect(g);
  src.start(); src.stop(AC.currentTime + dur);
}
function playTone(vol, dur, wave, f0, f1){
  if (!AC || muted) return;
  var o = AC.createOscillator(); o.type = wave;
  o.frequency.setValueAtTime(f0, AC.currentTime);
  o.frequency.exponentialRampToValueAtTime(Math.max(1, f1), AC.currentTime + dur);
  var g = envGain(vol, dur);
  o.connect(g); o.start(); o.stop(AC.currentTime + dur);
}
var flameSfxT = 0, growlSfxT = 0;
function sfx(name){
  if (!AC || muted) return;
  switch (name){
    case 'pistol':  playNoise(0.5, 0.09, 'bandpass', 1400, 1.2); playTone(0.25, 0.07, 'square', 320, 90); break;
    case 'smg':     playNoise(0.35, 0.06, 'bandpass', 1900, 1.5); playTone(0.15, 0.05, 'square', 420, 120); break;
    case 'shotgun': playNoise(0.8, 0.22, 'lowpass', 900, 0.6); playTone(0.4, 0.16, 'sine', 140, 40); break;
    case 'rifle':   playNoise(0.6, 0.13, 'bandpass', 1000, 1.0); playTone(0.35, 0.12, 'sawtooth', 220, 50); break;
    case 'flamethrower':
      if (performance.now() - flameSfxT < 90) return;
      flameSfxT = performance.now();
      playNoise(0.16, 0.14, 'lowpass', 600, 0.4); break;
    case 'explosion': playNoise(0.9, 0.55, 'lowpass', 360, 0.5); playTone(0.6, 0.5, 'sine', 90, 28); break;
    case 'growl':
      if (performance.now() - growlSfxT < 500) return;
      growlSfxT = performance.now();
      playTone(0.22, 0.35, 'sawtooth', 95 + Math.random() * 40, 45); break;
    case 'zdie':    playTone(0.25, 0.28, 'sawtooth', 130, 40); playNoise(0.18, 0.2, 'lowpass', 500, 0.5); break;
    case 'hurt':    playTone(0.4, 0.16, 'square', 210, 70); break;
    case 'pickup':  playTone(0.3, 0.09, 'sine', 660, 660); setTimeout(function(){ playTone(0.3, 0.14, 'sine', 990, 990); }, 80); break;
    case 'spit':    playNoise(0.2, 0.12, 'bandpass', 700, 2); break;
    case 'wave':    playTone(0.3, 0.5, 'triangle', 180, 320); break;
    case 'empty':   playTone(0.2, 0.08, 'square', 500, 220); break;
    case 'beacon':  playTone(0.22, 0.2, 'sine', 880, 880); break;
    case 'slamwarn': playTone(0.3, 0.5, 'sawtooth', 55, 190); break;
    case 'slam':    playNoise(0.85, 0.45, 'lowpass', 300, 0.5); playTone(0.5, 0.45, 'sine', 70, 24); break;
    case 'turret':  playNoise(0.22, 0.05, 'bandpass', 2100, 1.6); break;
    case 'bossdie': playTone(0.4, 0.6, 'sawtooth', 160, 30); playNoise(0.5, 0.5, 'lowpass', 420, 0.5); break;
  }
}

/* ---------- arcade wallet + haptics ---------- */
function awardCoinsPlus(slug, base){
  try{
    const w=JSON.parse(localStorage.getItem('arcade-wallet'))||{coins:0,earned:{},spent:0,tickets:0};
    let n=Math.max(1,Math.min(200,Math.round(base)));
    n=Math.round(n*(1+(w.bonusPct||0)/100));
    let lucky=1; const r=Math.random();
    if(r<0.01)lucky=5; else if(r<0.04)lucky=3; else if(r<0.14)lucky=2;
    n*=lucky;
    const ticket=Math.random()<0.03;
    w.coins+=n; w.earned[slug]=(w.earned[slug]||0)+n;
    if(ticket)w.tickets=(w.tickets||0)+1;
    localStorage.setItem('arcade-wallet',JSON.stringify(w));
    return {n,lucky,ticket,total:w.coins};
  }catch(e){return {n:0,lucky:1,ticket:false,total:0}}
}
function awardCoins(slug, n){return awardCoinsPlus(slug, n).total}
function walletCoins(){try{const w=JSON.parse(localStorage.getItem('arcade-wallet'));return (w&&w.coins)||0}catch(e){return 0}}

  if (n >= 0){
    var w = WEAPON_ORDER[n];
    if (w === 'pistol' || S.player.ammo[w] > 0){ S.player.weapon = w; sfx('pickup'); }
  }
  if (['ArrowUp','ArrowDown','ArrowLeft','ArrowRight','Space'].indexOf(e.code) >= 0) e.preventDefault();
});
window.addEventListener('keyup', function(e){ keys[e.code] = false; });
canvas.addEventListener('mousemove', function(e){ mouse.x = e.clientX; mouse.y = e.clientY; });
canvas.addEventListener('mousedown', function(e){ if (e.button === 0) mouse.down = true; });
window.addEventListener('mouseup', function(){ mouse.down = false; });
canvas.addEventListener('contextmenu', function(e){ e.preventDefault(); });
window.addEventListener('blur', function(){ if (started && !paused && !S.over) togglePause(); });

/* touch twin sticks */
var moveStick = null, aimStick = null; // {id, ox, oy, x, y}
var isTouch = false;
function tpos(t){ return { x: t.clientX, y: t.clientY }; }
canvas.addEventListener('touchstart', function(e){
  e.preventDefault(); isTouch = true;
  for (var i = 0; i < e.changedTouches.length; i++){
    var t = e.changedTouches[i], p = tpos(t);
    if (p.x < W / 2 && !moveStick) moveStick = { id:t.identifier, ox:p.x, oy:p.y, x:p.x, y:p.y };
    else if (p.x >= W / 2 && !aimStick) aimStick = { id:t.identifier, ox:p.x, oy:p.y, x:p.x, y:p.y };
  }
}, { passive:false });
canvas.addEventListener('touchmove', function(e){
  e.preventDefault();
  for (var i = 0; i < e.changedTouches.length; i++){
    var t = e.changedTouches[i], p = tpos(t);
    if (moveStick && t.identifier === moveStick.id){ moveStick.x = p.x; moveStick.y = p.y; }
    if (aimStick && t.identifier === aimStick.id){ aimStick.x = p.x; aimStick.y = p.y; }
  }
}, { passive:false });
function touchEnd(e){
  e.preventDefault();
  for (var i = 0; i < e.changedTouches.length; i++){
    var t = e.changedTouches[i];
    if (moveStick && t.identifier === moveStick.id) moveStick = null;
    if (aimStick && t.identifier === aimStick.id) aimStick = null;
  }
}
canvas.addEventListener('touchend', touchEnd, { passive:false });
canvas.addEventListener('touchcancel', touchEnd, { passive:false });

function readInput(){
  var inp = { mx:0, my:0, fire:false, aim:S.player.angle };
  if (keys.KeyW || keys.ArrowUp) inp.my -= 1;
  if (keys.KeyS || keys.ArrowDown) inp.my += 1;
  if (keys.KeyA || keys.ArrowLeft) inp.mx -= 1;
  if (keys.KeyD || keys.ArrowRight) inp.mx += 1;
  if (moveStick){
    var dx = moveStick.x - moveStick.ox, dy = moveStick.y - moveStick.oy;
    var l = Math.sqrt(dx*dx + dy*dy);
    if (l > 8){ var m = Math.min(1, l / 60); inp.mx = dx / l * m; inp.my = dy / l * m; }
  }
  if (aimStick){
    var ax = aimStick.x - aimStick.ox, ay = aimStick.y - aimStick.oy;
    var al = Math.sqrt(ax*ax + ay*ay);
    if (al > 14){ inp.aim = Math.atan2(ay, ax); inp.fire = true; }
  } else if (!isTouch){
    var psx = S.player.x - camX, psy = S.player.y - camY;
    inp.aim = Math.atan2(mouse.y - psy, mouse.x - psx);
    inp.fire = mouse.down;
  }
  return inp;
}

/* ---------- particles / fx ---------- */
function addBlood(x, y, n, big){
  for (var i = 0; i < n; i++){
    var a = Math.random() * 6.283, sp = 30 + Math.random() * (big ? 160 : 90);
    particles.push({ x:x, y:y, vx:Math.cos(a)*sp, vy:Math.sin(a)*sp,
      life:0.35 + Math.random()*0.4, max:0.75, r:2 + Math.random()*(big?3.5:2),
      col:'#7c1216', fr:0.0008 });
  }
}
function addFlash(x, y, r, ttl, warm){
  lights.push({ x:x, y:y, r:r, t:ttl, max:ttl, warm:warm });
}
function addFloat(x, y, txt, col, size){
  floats.push({ x:x, y:y, txt:txt, col:col || '#fff', size:size || 15, t:1, max:1 });
}
function addBoom(x, y, r){
  for (var i = 0; i < 26; i++){
    var a = Math.random() * 6.283, sp = 40 + Math.random() * 260;
    particles.push({ x:x, y:y, vx:Math.cos(a)*sp, vy:Math.sin(a)*sp,
      life:0.25 + Math.random()*0.4, max:0.65, r:2.5 + Math.random()*4,
      col: Math.random() < 0.5 ? '#ffb347' : '#ff6b35', fr:0.001 });
  }
  addFlash(x, y, r * 2.6, 0.32, true);
  shake = Math.min(22, shake + 13);
}

var turretSfxT = 0;
function processEvents(){
  var evs = S.events;
  S.events = [];
  for (var i = 0; i < evs.length; i++){
    var e = evs[i];
    switch (e.type){
      case 'shot':
        sfx(e.weapon);
        if (e.weapon !== 'flamethrower'){
          shake = Math.min(10, shake + (e.weapon === 'shotgun' ? 4.5 : e.weapon === 'rifle' ? 3 : 1.4));
        }
        break;
      case 'zhit':
        addBlood(e.x, e.y, 4);
        marks.push({ x:e.x, y:e.y, t:0.16 });
        break;
      case 'zdie':
        addBlood(e.x, e.y, 14, true);
        decals.push({ x:e.x, y:e.y, r:e.r * 1.3 + Math.random() * 6, t:9, max:9 });
        addFloat(e.x, e.y - 14, '+' + e.gained + (e.mult > 1 ? '  x' + e.mult : ''), e.mult > 1 ? '#f5d76e' : '#d8d8e8', e.mult > 1 ? 17 : 14);
        sfx('zdie');
        buzz(15);
        break;
      case 'explosion': addBoom(e.x, e.y, e.r); sfx('explosion'); break;
      case 'hurt': hurtFlash = 0.5; shake = Math.min(16, shake + 7); sfx('hurt'); addBlood(S.player.x, S.player.y, 8); break;
      case 'pickup':
        sfx('pickup');
        addFloat(e.x, e.y - 24, WEAPONS[e.weapon].name + '!', '#8fd0ff', 16);
        break;
      case 'wave': sfx('wave'); if (e.surge) addFloat(S.player.x, S.player.y - 60, 'HORDE SURGE!', '#ff6b6b', 22); break;
      case 'waveclear': addFloat(S.player.x, S.player.y - 40, 'WAVE CLEAR  +' + e.bonus, '#9fe8a0', 18); sfx('pickup'); break;
      case 'spark':
        particles.push({ x:e.x, y:e.y, vx:(Math.random()-0.5)*120, vy:(Math.random()-0.5)*120,
          life:0.15, max:0.15, r:1.8, col:'#ffd77a', fr:0.001 });
        break;
      case 'spit': sfx('spit'); break;
      case 'acidhit':
        for (var k = 0; k < 6; k++)
          particles.push({ x:e.x, y:e.y, vx:(Math.random()-0.5)*140, vy:(Math.random()-0.5)*140,
            life:0.3, max:0.3, r:2.4, col:'#9ee83c', fr:0.001 });
        break;
      case 'burnpuff':
        particles.push({ x:e.x + (Math.random()-0.5)*10, y:e.y + (Math.random()-0.5)*10,
          vx:(Math.random()-0.5)*30, vy:-40 - Math.random()*40,
          life:0.35, max:0.35, r:3, col:'#ff8c42', fr:0.01 });
        break;
      case 'beacon': sfx('beacon'); break;
      case 'drop': shake = Math.min(12, shake + 5); sfx('explosion'); break;
      case 'empty': sfx('empty'); addFloat(S.player.x, S.player.y - 26, 'EMPTY — PISTOL', '#ffb0b0', 13); break;
      case 'swap': sfx('pickup'); break;
      case 'slamwarn': sfx('slamwarn'); addFloat(e.x, e.y - 54, 'SLAM INCOMING!', '#ff6b6b', 16); break;
      case 'slam':
        sfx('slam');
        shake = Math.min(24, shake + 15);
        addFlash(e.x, e.y, 220, 0.3, true);
        break;
      case 'bossdie':
        sfx('bossdie');
        shake = Math.min(24, shake + 16);
        addFloat(e.x, e.y - 40, 'BOSS DOWN!', '#f5d76e', 24);
        // coin shower
        for (var cs = 0; cs < 26; cs++){
          var ca = Math.random() * 6.283, csp = 60 + Math.random() * 240;
          particles.push({ x:e.x, y:e.y, vx:Math.cos(ca)*csp, vy:Math.sin(ca)*csp,
            life:0.6 + Math.random()*0.7, max:1.3, r:3 + Math.random()*2.5,
            col: Math.random() < 0.5 ? '#f5d76e' : '#e0a840', fr:0.02 });
        }
        addFlash(e.x, e.y, 260, 0.5, true);
        break;
      case 'turretup': sfx('pickup'); addFloat(e.x, e.y - 26, 'TURRET BUDDY — 20s', '#8fd0ff', 15); break;
      case 'turretdown': addFloat(e.x, e.y - 20, 'turret offline', '#9a9ab0', 12); break;
      case 'turretshot':
        if (performance.now() - turretSfxT > 110){ turretSfxT = performance.now(); sfx('turret'); }
        break;
      case 'gameover': onGameOver(); break;
    }
  }
}

/* ---------- drawing ---------- */
function rrect(c, x, y, w, h, r){
  c.beginPath();
  c.moveTo(x + r, y);
  c.arcTo(x + w, y, x + w, y + h, r);
  c.arcTo(x + w, y + h, x, y + h, r);
  c.arcTo(x, y + h, x, y, r);
  c.arcTo(x, y, x + w, y, r);
  c.closePath();
}

var ZCOLORS = { walker:'#6a8f5a', runner:'#8fb04f', brute:'#4d6b44', spitter:'#7fae60', exploder:'#b0623f', boss:'#5a7a3f' };

function drawTurret(tb){
  ctx.save();
  ctx.translate(tb.x, tb.y);
  // base
  ctx.fillStyle = 'rgba(0,0,0,0.4)';
  ctx.beginPath(); ctx.ellipse(0, 4, 13, 6, 0, 0, 7); ctx.fill();
  ctx.fillStyle = '#3a4a5c';
  ctx.beginPath(); ctx.arc(0, 0, 10, 0, 7); ctx.fill();
  ctx.strokeStyle = '#8fd0ff'; ctx.lineWidth = 1.5; ctx.stroke();
  // barrel
  ctx.rotate(tb.angle);
  ctx.fillStyle = '#22222e';
  ctx.fillRect(4, -2.5, 15, 5);
  // muzzle flash
  if (tb.muzzleT > 0){
    ctx.fillStyle = 'rgba(255,224,130,0.9)';
    ctx.beginPath();
    ctx.moveTo(19, 0); ctx.lineTo(28, -4); ctx.lineTo(31, 0); ctx.lineTo(28, 4);
    ctx.closePath(); ctx.fill();
  }
  ctx.rotate(-tb.angle);
  // remaining-time ring
  var frac = clamp(tb.t / 20, 0, 1);
  ctx.strokeStyle = 'rgba(143,208,255,0.8)';
  ctx.lineWidth = 2;
  ctx.beginPath(); ctx.arc(0, 0, 14, -1.5708, -1.5708 + frac * 6.283); ctx.stroke();
  // blinking light
  ctx.fillStyle = Math.floor(S.t * 4) % 2 === 0 ? '#8fd0ff' : '#33506a';
  ctx.beginPath(); ctx.arc(0, -6, 2, 0, 7); ctx.fill();
  ctx.restore();
}

function drawZombie(z){
  var t = S.t;
  var c = ZCOLORS[z.type];
  var ang = Math.atan2(S.player.y - z.y, S.player.x - z.x);
  ctx.save();
  ctx.translate(z.x, z.y);
  // arms reaching forward
  ctx.strokeStyle = z.hitT > 0 ? '#ffffff' : c;
  ctx.lineWidth = z.type === 'brute' ? 7 : 4.5;
  ctx.lineCap = 'round';
  var reach = z.r + 7, sway = Math.sin(t * 6 + z.wob) * 0.35;
  ctx.beginPath();
  ctx.moveTo(Math.cos(ang + 0.7) * z.r * 0.6, Math.sin(ang + 0.7) * z.r * 0.6);
  ctx.lineTo(Math.cos(ang + 0.3 + sway) * reach, Math.sin(ang + 0.3 + sway) * reach);
  ctx.moveTo(Math.cos(ang - 0.7) * z.r * 0.6, Math.sin(ang - 0.7) * z.r * 0.6);
  ctx.lineTo(Math.cos(ang - 0.3 - sway) * reach, Math.sin(ang - 0.3 - sway) * reach);
  ctx.stroke();
  // body
  ctx.fillStyle = z.hitT > 0 ? '#ffffff' : c;
  if (z.type === 'exploder'){
    var pulse = 1 + Math.sin(t * 12) * 0.1;
    ctx.fillStyle = z.hitT > 0 ? '#fff' : (Math.sin(t * 10) > 0 ? '#c25036' : '#a04530');
    ctx.beginPath(); ctx.arc(0, 0, z.r * pulse, 0, 7); ctx.fill();
  } else {
    ctx.beginPath(); ctx.arc(0, 0, z.r, 0, 7); ctx.fill();
  }
  ctx.strokeStyle = 'rgba(0,0,0,0.45)'; ctx.lineWidth = 2; ctx.stroke();
  // eyes
  ctx.fillStyle = z.type === 'exploder' ? '#ffe066' : '#e8f5c0';
  var ex = Math.cos(ang) * z.r * 0.45, ey = Math.sin(ang) * z.r * 0.45;
  var pxp = Math.cos(ang + 1.57) * z.r * 0.32, pyp = Math.sin(ang + 1.57) * z.r * 0.32;
  ctx.beginPath();
  ctx.arc(ex + pxp, ey + pyp, z.r * 0.16, 0, 7);
  ctx.arc(ex - pxp, ey - pyp, z.r * 0.16, 0, 7);
  ctx.fill();
  // spitter mouth
  if (z.type === 'spitter'){
    ctx.fillStyle = '#9ee83c';
    ctx.beginPath(); ctx.arc(ex, ey, z.r * 0.24, 0, 7); ctx.fill();
  }
  // burn flames
  if (z.burnT > 0){
    ctx.fillStyle = 'rgba(255,140,66,' + (0.5 + Math.sin(t * 20) * 0.2) + ')';
    ctx.beginPath();
    ctx.arc(Math.sin(t * 13 + z.wob) * 5, -z.r * 0.5 + Math.cos(t * 11) * 3, z.r * 0.5, 0, 7);
    ctx.fill();
  }
  // hp bar for damaged / brutes
  if (z.hp < z.maxHp){
    var bw = z.r * 2;
    ctx.fillStyle = 'rgba(0,0,0,0.5)';
    ctx.fillRect(-bw/2, -z.r - 9, bw, 4);
    ctx.fillStyle = z.type === 'brute' ? '#e05555' : '#7ec850';
    ctx.fillRect(-bw/2, -z.r - 9, bw * clamp(z.hp / z.maxHp, 0, 1), 4);
  }
  ctx.restore();
}

function drawPlayer(){
  var P = S.player;
  if (P.invuln > 0 && Math.floor(S.t * 18) % 2 === 0 && !S.over) return; // flicker
  ctx.save();
  ctx.translate(P.x, P.y);
  ctx.rotate(P.angle);
  // body
  ctx.fillStyle = '#4a7dbf';
  ctx.beginPath(); ctx.arc(0, 0, P.r, 0, 7); ctx.fill();
  ctx.strokeStyle = 'rgba(0,0,0,0.5)'; ctx.lineWidth = 2; ctx.stroke();
  // vest
  ctx.fillStyle = '#2f4f7a';
  ctx.beginPath(); ctx.arc(0, 0, P.r * 0.62, 0, 7); ctx.fill();
  // gun
  ctx.fillStyle = '#22222e';
  ctx.fillRect(P.r * 0.3, -3.5, P.r + 8, 7);
  ctx.fillStyle = '#3a3a4c';
  ctx.fillRect(P.r * 0.3, -3.5, 8, 7);
  // hands
  ctx.fillStyle = '#e8c39e';
  ctx.beginPath();
  ctx.arc(P.r * 0.75, -6, 4, 0, 7);
  ctx.arc(P.r * 0.95, 5, 4, 0, 7);
  ctx.fill();
  // muzzle flash
  if (P.muzzleT > 0){
    var mf = P.muzzleT / 0.07;
    ctx.fillStyle = 'rgba(255,224,130,' + Math.min(1, mf) + ')';
    ctx.beginPath();
    var mx = P.r + 10;
    ctx.moveTo(mx, 0);
    ctx.lineTo(mx + 14 + Math.random() * 8, -6);
    ctx.lineTo(mx + 20 + Math.random() * 10, 0);
    ctx.lineTo(mx + 14 + Math.random() * 8, 6);
    ctx.closePath(); ctx.fill();
  }
  ctx.restore();
}

function drawObstacles(){
  var i, R;
  for (i = 0; i < S.obstacles.rects.length; i++){
    R = S.obstacles.rects[i];
    if (R.type === 'car'){
      ctx.save();
      ctx.fillStyle = 'rgba(0,0,0,0.35)';
      rrect(ctx, R.x + 4, R.y + 5, R.w, R.h, 10); ctx.fill();
      ctx.fillStyle = 'hsl(' + R.hue + ',35%,30%)';
      rrect(ctx, R.x, R.y, R.w, R.h, 10); ctx.fill();
      ctx.strokeStyle = 'rgba(0,0,0,0.4)'; ctx.lineWidth = 2; ctx.stroke();
      // windows
      ctx.fillStyle = 'rgba(150,190,230,0.28)';
      if (R.w > R.h){
        rrect(ctx, R.x + R.w * 0.28, R.y + 6, R.w * 0.42, R.h - 12, 6); ctx.fill();
      } else {
        rrect(ctx, R.x + 6, R.y + R.h * 0.28, R.w - 12, R.h * 0.42, 6); ctx.fill();
      }
      ctx.restore();
    } else {
      ctx.fillStyle = 'rgba(0,0,0,0.3)';
      ctx.fillRect(R.x + 3, R.y + 4, R.w, R.h);
      ctx.fillStyle = '#6b5233';
      ctx.fillRect(R.x, R.y, R.w, R.h);
      ctx.strokeStyle = '#4a3a24'; ctx.lineWidth = 2;
      ctx.strokeRect(R.x + 1, R.y + 1, R.w - 2, R.h - 2);
      ctx.beginPath();
      ctx.moveTo(R.x, R.y); ctx.lineTo(R.x + R.w, R.y + R.h);
      ctx.moveTo(R.x + R.w, R.y); ctx.lineTo(R.x, R.y + R.h);
      ctx.stroke();
    }
  }
  for (i = 0; i < S.obstacles.barrels.length; i++){
    var b = S.obstacles.barrels[i];
    if (b.dead){
      ctx.fillStyle = 'rgba(20,16,14,0.5)';
      ctx.beginPath(); ctx.arc(b.x, b.y, b.r * 1.5, 0, 7); ctx.fill();
      continue;
    }
    ctx.fillStyle = 'rgba(0,0,0,0.35)';
    ctx.beginPath(); ctx.arc(b.x + 3, b.y + 3, b.r, 0, 7); ctx.fill();
    ctx.fillStyle = b.hp < 30 ? '#c0392b' : '#a93226';
    ctx.beginPath(); ctx.arc(b.x, b.y, b.r, 0, 7); ctx.fill();
    ctx.strokeStyle = 'rgba(0,0,0,0.5)'; ctx.lineWidth = 2; ctx.stroke();
    ctx.strokeStyle = 'rgba(255,220,120,0.7)'; ctx.lineWidth = 2;
    ctx.beginPath(); ctx.arc(b.x, b.y, b.r * 0.55, 0, 7); ctx.stroke();
    ctx.fillStyle = 'rgba(255,220,120,0.85)';
    ctx.font = 'bold 11px -apple-system,sans-serif';
    ctx.textAlign = 'center'; ctx.textBaseline = 'middle';
    ctx.fillText('!', b.x, b.y + 0.5);
  }
}

var WCOLORS = { smg:'#8fd0ff', shotgun:'#ffb347', rifle:'#c39bd3', flamethrower:'#ff8c42', pistol:'#d8d8e8' };
function drawPickups(){
  var i;
  for (i = 0; i < S.pickups.length; i++){
    var p = S.pickups[i];
    var bob = Math.sin(S.t * 4 + i) * 3;
    var blink = p.t < 4 && Math.floor(S.t * 6) % 2 === 0;
    if (blink) continue;
    ctx.save();
    ctx.translate(p.x, p.y + bob);
    ctx.fillStyle = 'rgba(0,0,0,0.4)';
    ctx.beginPath(); ctx.ellipse(0, 12 - bob, 12, 5, 0, 0, 7); ctx.fill();
    ctx.fillStyle = p.air ? '#3a5a40' : '#5a4a30';
    rrect(ctx, -12, -10, 24, 20, 4); ctx.fill();
    var pcol = p.turret ? '#ffd93d' : (WCOLORS[p.weapon] || '#fff');
    ctx.strokeStyle = pcol; ctx.lineWidth = 2.5; ctx.stroke();
    ctx.fillStyle = pcol;
    ctx.font = 'bold 10px -apple-system,sans-serif';
    ctx.textAlign = 'center'; ctx.textBaseline = 'middle';
    ctx.fillText(p.turret ? '⚙' : WEAPONS[p.weapon].name[0], 0, 0.5);
    ctx.restore();
  }
  for (i = 0; i < S.beacons.length; i++){
    var bc = S.beacons[i];
    var pulse = (S.t * 2) % 1;
    ctx.strokeStyle = 'rgba(255,80,80,' + (0.8 - pulse * 0.8) + ')';
    ctx.lineWidth = 3;
    ctx.beginPath(); ctx.arc(bc.x, bc.y, 8 + pulse * 30, 0, 7); ctx.stroke();
    ctx.fillStyle = Math.floor(S.t * 5) % 2 === 0 ? '#ff5050' : '#902020';
    ctx.beginPath(); ctx.arc(bc.x, bc.y, 5, 0, 7); ctx.fill();
    // incoming crate shadow grows
    var prog = 1 - bc.t / 3;
    ctx.fillStyle = 'rgba(0,0,0,' + (0.15 + prog * 0.3) + ')';
    ctx.beginPath(); ctx.ellipse(bc.x, bc.y, 6 + prog * 10, 3 + prog * 5, 0, 0, 7); ctx.fill();
  }
}

function drawLights(){
  var P = S.player;
  lctx.setTransform(1, 0, 0, 1, 0, 0);
  lctx.globalCompositeOperation = 'source-over';
  lctx.fillStyle = 'rgba(5,6,16,0.88)';
  lctx.fillRect(0, 0, W, H);
  lctx.globalCompositeOperation = 'destination-out';
  var psx = P.x - camX, psy = P.y - camY;
  // radial around player
  var g = lctx.createRadialGradient(psx, psy, 20, psx, psy, 250);
  g.addColorStop(0, 'rgba(0,0,0,0.98)');
  g.addColorStop(0.55, 'rgba(0,0,0,0.55)');
  g.addColorStop(1, 'rgba(0,0,0,0)');
  lctx.fillStyle = g;
  lctx.beginPath(); lctx.arc(psx, psy, 250, 0, 7); lctx.fill();
  // flashlight cone ahead
  var cx2 = psx + Math.cos(P.angle) * 180, cy2 = psy + Math.sin(P.angle) * 180;
  var g2 = lctx.createRadialGradient(cx2, cy2, 10, cx2, cy2, 210);
  g2.addColorStop(0, 'rgba(0,0,0,0.6)');
  g2.addColorStop(1, 'rgba(0,0,0,0)');
  lctx.fillStyle = g2;
  lctx.beginPath(); lctx.arc(cx2, cy2, 210, 0, 7); lctx.fill();
  // muzzle light
  if (P.muzzleT > 0){
    var mx = psx + Math.cos(P.angle) * (P.r + 14), my = psy + Math.sin(P.angle) * (P.r + 14);
    var g3 = lctx.createRadialGradient(mx, my, 4, mx, my, 130);
    g3.addColorStop(0, 'rgba(0,0,0,0.95)');
    g3.addColorStop(1, 'rgba(0,0,0,0)');
    lctx.fillStyle = g3;
    lctx.beginPath(); lctx.arc(mx, my, 130, 0, 7); lctx.fill();
  }
  // dynamic lights (explosions, drops)
  for (var i = lights.length - 1; i >= 0; i--){
    var L = lights[i];
    var lx = L.x - camX, ly = L.y - camY;
    var a = L.t / L.max;
    var g4 = lctx.createRadialGradient(lx, ly, 5, lx, ly, L.r);
    g4.addColorStop(0, 'rgba(0,0,0,' + (0.95 * a) + ')');
    g4.addColorStop(1, 'rgba(0,0,0,0)');
    lctx.fillStyle = g4;
    lctx.beginPath(); lctx.arc(lx, ly, L.r, 0, 7); lctx.fill();
  }
  // beacon glows
  for (i = 0; i < S.beacons.length; i++){
    var bc = S.beacons[i];
    var bx = bc.x - camX, by = bc.y - camY;
    var g5 = lctx.createRadialGradient(bx, by, 2, bx, by, 90);
    g5.addColorStop(0, 'rgba(0,0,0,0.7)');
    g5.addColorStop(1, 'rgba(0,0,0,0)');
    lctx.fillStyle = g5;
    lctx.beginPath(); lctx.arc(bx, by, 90, 0, 7); lctx.fill();
  }
  ctx.drawImage(lightCv, 0, 0, W, H);
  // warm tint over flame/explosion lights
  ctx.save();
  ctx.globalCompositeOperation = 'lighter';
  for (i = 0; i < lights.length; i++){
    var L2 = lights[i];
    if (!L2.warm) continue;
    var lx2 = L2.x - camX, ly2 = L2.y - camY;
    var a2 = (L2.t / L2.max) * 0.25;
    var g6 = ctx.createRadialGradient(lx2, ly2, 5, lx2, ly2, L2.r * 0.8);
    g6.addColorStop(0, 'rgba(255,140,50,' + a2 + ')');
    g6.addColorStop(1, 'rgba(255,140,50,0)');
    ctx.fillStyle = g6;
    ctx.beginPath(); ctx.arc(lx2, ly2, L2.r * 0.8, 0, 7); ctx.fill();
  }
  ctx.restore();
}

function drawHUD(){
  var P = S.player;
  var safeTop = 12;
  // HP bar
  var hx = 14, hy = safeTop + 44, hw = Math.min(220, W * 0.35);
  ctx.fillStyle = 'rgba(20,20,32,0.8)';
  rrect(ctx, hx - 4, hy - 4, hw + 8, 26, 13); ctx.fill();
  ctx.fillStyle = '#3a1518';
  rrect(ctx, hx, hy, hw, 18, 9); ctx.fill();
  var hpF = clamp(P.hp / P.maxHp, 0, 1);
  if (hpF > 0){
    ctx.fillStyle = hpF > 0.5 ? '#5fbf6a' : hpF > 0.25 ? '#e0a840' : '#e05555';
    rrect(ctx, hx, hy, Math.max(10, hw * hpF), 18, 9); ctx.fill();
  }
  ctx.fillStyle = '#fff';
  ctx.font = 'bold 12px -apple-system,sans-serif';
  ctx.textAlign = 'center'; ctx.textBaseline = 'middle';
  ctx.fillText(Math.ceil(P.hp) + ' HP', hx + hw / 2, hy + 9.5);

  // weapon pill
  var w = WEAPONS[P.weapon];
  var ammoTxt = P.weapon === 'pistol' ? '∞' : String(P.ammo[P.weapon]);
  var wt = w.name + '  ' + ammoTxt;
  ctx.font = 'bold 14px -apple-system,sans-serif';
  var tw = ctx.measureText(wt).width;
  var wx = 14, wy = hy + 32;
  ctx.fillStyle = 'rgba(20,20,32,0.8)';
  rrect(ctx, wx - 4, wy, tw + 28, 28, 14); ctx.fill();
  ctx.fillStyle = WCOLORS[P.weapon];
  ctx.beginPath(); ctx.arc(wx + 8, wy + 14, 5, 0, 7); ctx.fill();
  ctx.fillStyle = '#e8e8f0';
  ctx.textAlign = 'left';
  ctx.fillText(wt, wx + 20, wy + 14.5);

  // wave / score center top
  ctx.textAlign = 'center';
  ctx.fillStyle = 'rgba(20,20,32,0.7)';
  var cw = 210;
  rrect(ctx, W / 2 - cw / 2, safeTop, cw, 46, 14); ctx.fill();
  ctx.fillStyle = '#9a9ab0';
  ctx.font = '600 11px -apple-system,sans-serif';
  ctx.fillText('WAVE', W / 2 - 62, safeTop + 14);
  ctx.fillText('SCORE', W / 2 + 30, safeTop + 14);
  ctx.fillStyle = '#fff';
  ctx.font = 'bold 19px -apple-system,sans-serif';
  ctx.fillText(S.wave || '—', W / 2 - 62, safeTop + 33);
  ctx.fillText(S.score.toLocaleString(), W / 2 + 30, safeTop + 33);
  // combo
  var mult = comboMult(S);
  if (mult > 1 && S.streakT > 0){
    ctx.fillStyle = '#f5d76e';
    ctx.font = 'bold 16px -apple-system,sans-serif';
    ctx.fillText('x' + mult + ' COMBO', W / 2, safeTop + 66);
  }
  // zombies remaining
  var rem = S.zombies.length + S.toSpawn.length;
  if (S.phase === 'wave' && rem > 0){
    ctx.fillStyle = '#9a9ab0';
    ctx.font = '600 12px -apple-system,sans-serif';
    ctx.fillText('☠ ' + rem, W / 2, safeTop + (mult > 1 && S.streakT > 0 ? 84 : 66));
  }
  // boss HP bar (massive, top center)
  var boss = null;
  for (var bi = 0; bi < S.zombies.length; bi++){
    if (S.zombies[bi].type === 'boss'){ boss = S.zombies[bi]; break; }
  }
  if (boss){
    var bbw = Math.min(420, W * 0.6), bby = safeTop + 96;
    ctx.fillStyle = 'rgba(20,20,32,0.8)';
    rrect(ctx, W / 2 - bbw / 2 - 4, bby - 4, bbw + 8, 24, 12); ctx.fill();
    ctx.fillStyle = '#3a1518';
    rrect(ctx, W / 2 - bbw / 2, bby, bbw, 16, 8); ctx.fill();
    var bf = clamp(boss.hp / boss.maxHp, 0, 1);
    if (bf > 0){
      ctx.fillStyle = '#e05555';
      rrect(ctx, W / 2 - bbw / 2, bby, Math.max(10, bbw * bf), 16, 8); ctx.fill();
    }
    ctx.fillStyle = '#ffd7d7';
    ctx.font = 'bold 11px -apple-system,sans-serif';
    ctx.fillText('☠ BOSS BRUTE', W / 2, bby + 8.5);
  }
}

function drawBanner(){
  if (S.phase !== 'intermission' || !started || S.over) return;
  ctx.fillStyle = 'rgba(18,10,32,0.4)';
  ctx.fillRect(0, 0, W, H);
  var n = S.wave + 1;
  var surge = n % 5 === 0;
  ctx.textAlign = 'center'; ctx.textBaseline = 'middle';
  var pulse = 1 + Math.sin(S.t * 6) * 0.03;
  ctx.save();
  ctx.translate(W / 2, H * 0.38);
  ctx.scale(pulse, pulse);
  ctx.font = 'bold ' + Math.min(52, W * 0.08) + 'px -apple-system,sans-serif';
  ctx.fillStyle = surge ? '#ff6b6b' : '#c8f5c0';
  ctx.shadowColor = surge ? 'rgba(255,60,60,0.7)' : 'rgba(120,255,120,0.5)';
  ctx.shadowBlur = 26;
  ctx.fillText(surge ? 'WAVE ' + n + ' — HORDE!' : 'WAVE ' + n + ' INCOMING', 0, 0);
  ctx.restore();
  ctx.font = '600 17px -apple-system,sans-serif';
  ctx.fillStyle = '#9a9ab0';
  ctx.fillText(Math.ceil(S.phaseT) + '… catch your breath', W / 2, H * 0.38 + 52);
}

function drawTouchUI(){
  if (!isTouch) return;
  ctx.save();
  ctx.lineWidth = 3;
  var s, dx, dy, l;
  if (moveStick){
    s = moveStick;
    ctx.strokeStyle = 'rgba(255,255,255,0.25)';
    ctx.beginPath(); ctx.arc(s.ox, s.oy, 52, 0, 7); ctx.stroke();
    dx = s.x - s.ox; dy = s.y - s.oy; l = Math.sqrt(dx*dx + dy*dy) || 1;
    var cl = Math.min(l, 52);
    ctx.fillStyle = 'rgba(255,255,255,0.35)';
    ctx.beginPath(); ctx.arc(s.ox + dx / l * cl, s.oy + dy / l * cl, 24, 0, 7); ctx.fill();
  }
  if (aimStick){
    s = aimStick;
    ctx.strokeStyle = 'rgba(255,120,120,0.3)';
    ctx.beginPath(); ctx.arc(s.ox, s.oy, 52, 0, 7); ctx.stroke();
    dx = s.x - s.ox; dy = s.y - s.oy; l = Math.sqrt(dx*dx + dy*dy) || 1;
    var cl2 = Math.min(l, 52);
    ctx.fillStyle = 'rgba(255,120,120,0.4)';
    ctx.beginPath(); ctx.arc(s.ox + dx / l * cl2, s.oy + dy / l * cl2, 24, 0, 7); ctx.fill();
  }
  ctx.restore();
}

function render(dt){
  var P = S.player;
  // camera
  var tx = clamp(P.x - W / 2, Math.min(0, (ARENA_W - W) / 2), Math.max(0, ARENA_W - W));
  var ty = clamp(P.y - H / 2, Math.min(0, (ARENA_H - H) / 2), Math.max(0, ARENA_H - H));
  camX += (tx - camX) * Math.min(1, dt * 8);
  camY += (ty - camY) * Math.min(1, dt * 8);
  var shx = 0, shy = 0;
  if (shake > 0.2){
    shx = (Math.random() - 0.5) * shake;
    shy = (Math.random() - 0.5) * shake;
  }
  shake *= Math.pow(0.001, dt);
  hurtFlash = Math.max(0, hurtFlash - dt);

  ctx.setTransform(DPR, 0, 0, DPR, 0, 0);
  ctx.fillStyle = '#0b0b12';
  ctx.fillRect(0, 0, W, H);
  ctx.save();
  ctx.translate(-camX + shx, -camY + shy);

  ctx.drawImage(ground, 0, 0);

  var i;
  // blood decals
  for (i = 0; i < decals.length; i++){
    var d = decals[i];
    ctx.fillStyle = 'rgba(90,12,16,' + (0.45 * (d.t / d.max)) + ')';
    ctx.beginPath(); ctx.arc(d.x, d.y, d.r, 0, 7); ctx.fill();
  }
  // corpses
  for (i = 0; i < S.corpses.length; i++){
    var co = S.corpses[i];
    var a = clamp(co.t / co.max, 0, 1);
    ctx.save();
    ctx.globalAlpha = a * 0.8;
    ctx.fillStyle = ZCOLORS[co.type] || '#556';
    ctx.beginPath(); ctx.ellipse(co.x, co.y, co.r * 1.2, co.r * 0.7, co.x * 0.01, 0, 7); ctx.fill();
    ctx.restore();
  }
  drawPickups();
  drawObstacles();
  // acid globs
  for (i = 0; i < S.globs.length; i++){
    var g = S.globs[i];
    ctx.fillStyle = '#9ee83c';
    ctx.beginPath(); ctx.arc(g.x, g.y, 5, 0, 7); ctx.fill();
    ctx.fillStyle = 'rgba(158,232,60,0.35)';
    ctx.beginPath(); ctx.arc(g.x - g.vx * 0.02, g.y - g.vy * 0.02, 4, 0, 7); ctx.fill();
  }
  // turret buddies
  for (i = 0; i < S.turrets.length; i++) drawTurret(S.turrets[i]);
  // boss slam telegraph
  for (i = 0; i < S.zombies.length; i++){
    var bz = S.zombies[i];
    if (bz.type === 'boss' && bz.slamT > 0){
      ctx.strokeStyle = 'rgba(255,90,60,' + (0.35 + Math.sin(S.t * 20) * 0.15) + ')';
      ctx.lineWidth = 3;
      ctx.setLineDash([12, 9]);
      ctx.beginPath(); ctx.arc(bz.x, bz.y, 250, 0, 7); ctx.stroke();
      ctx.setLineDash([]);
    }
  }
  // boss shockwaves
  for (i = 0; i < S.shocks.length; i++){
    var sw = S.shocks[i];
    var swa = 1 - sw.r / sw.maxR;
    ctx.strokeStyle = 'rgba(255,170,90,' + (0.15 + 0.65 * swa) + ')';
    ctx.lineWidth = 7;
    ctx.beginPath(); ctx.arc(sw.x, sw.y, sw.r, 0, 7); ctx.stroke();
    ctx.strokeStyle = 'rgba(255,240,200,' + (0.1 + 0.4 * swa) + ')';
    ctx.lineWidth = 2.5;
    ctx.beginPath(); ctx.arc(sw.x, sw.y, sw.r - 5, 0, 7); ctx.stroke();
  }
  // zombies
  for (i = 0; i < S.zombies.length; i++) drawZombie(S.zombies[i]);
  drawPlayer();
  // bullets
  for (i = 0; i < S.bullets.length; i++){
    var b = S.bullets[i];
    if (b.flame){
      var fa = clamp(b.life / 0.34, 0, 1);
      ctx.fillStyle = 'rgba(' + (255) + ',' + Math.round(120 + 100 * fa) + ',40,' + (0.55 * fa + 0.1) + ')';
      ctx.beginPath(); ctx.arc(b.x, b.y, 4 + (1 - fa) * 9, 0, 7); ctx.fill();
    } else {
      ctx.strokeStyle = '#ffe9a0';
      ctx.lineWidth = 2.5;
      ctx.beginPath();
      ctx.moveTo(b.x, b.y);
      ctx.lineTo(b.x - b.vx * 0.016, b.y - b.vy * 0.016);
      ctx.stroke();
    }
  }
  // particles
  for (i = particles.length - 1; i >= 0; i--){
    var p = particles[i];
    p.x += p.vx * dt; p.y += p.vy * dt;
    p.vx *= Math.pow(p.fr, dt); p.vy *= Math.pow(p.fr, dt);
    p.life -= dt;
    if (p.life <= 0){ particles.splice(i, 1); continue; }
    ctx.globalAlpha = clamp(p.life / p.max, 0, 1);
    ctx.fillStyle = p.col;
    ctx.beginPath(); ctx.arc(p.x, p.y, p.r, 0, 7); ctx.fill();
  }
  ctx.globalAlpha = 1;
  // hit markers
  for (i = marks.length - 1; i >= 0; i--){
    var m = marks[i];
    m.t -= dt;
    if (m.t <= 0){ marks.splice(i, 1); continue; }
    ctx.strokeStyle = 'rgba(255,255,255,' + (m.t / 0.16) + ')';
    ctx.lineWidth = 2;
    ctx.beginPath();
    ctx.moveTo(m.x - 6, m.y - 6); ctx.lineTo(m.x + 6, m.y + 6);
    ctx.moveTo(m.x + 6, m.y - 6); ctx.lineTo(m.x - 6, m.y + 6);
    ctx.stroke();
  }
  // floating texts
  for (i = floats.length - 1; i >= 0; i--){
    var f = floats[i];
    f.t -= dt; f.y -= 34 * dt;
    if (f.t <= 0){ floats.splice(i, 1); continue; }
    ctx.globalAlpha = clamp(f.t / 0.5, 0, 1);
    ctx.fillStyle = f.col;
    ctx.font = 'bold ' + f.size + 'px -apple-system,sans-serif';
    ctx.textAlign = 'center'; ctx.textBaseline = 'middle';
    ctx.fillText(f.txt, f.x, f.y);
  }
  ctx.globalAlpha = 1;
  ctx.restore();

  // lights update + draw
  for (i = lights.length - 1; i >= 0; i--){
    lights[i].t -= dt;
    if (lights[i].t <= 0) lights.splice(i, 1);
  }
  if (P.muzzleT > 0 && WEAPONS[P.weapon].flame){
    addFlash(P.x + Math.cos(P.angle) * 60, P.y + Math.sin(P.angle) * 60, 110, 0.05, true);
  }
  drawLights();

  // damage vignette
  var vig = hurtFlash * 1.6 + (P.hp < 30 ? (0.35 + Math.sin(S.t * 5) * 0.12) * (1 - P.hp / 30) : 0);
  if (vig > 0.02){
    var vg = ctx.createRadialGradient(W/2, H/2, Math.min(W,H) * 0.3, W/2, H/2, Math.max(W,H) * 0.72);
    vg.addColorStop(0, 'rgba(180,20,25,0)');
    vg.addColorStop(1, 'rgba(180,20,25,' + Math.min(0.6, vig * 0.5) + ')');
    ctx.fillStyle = vg;
    ctx.fillRect(0, 0, W, H);
  }

  drawHUD();
  drawBanner();
  // crosshair
  if (!isTouch && started && !S.over && !paused){
    ctx.strokeStyle = 'rgba(255,255,255,0.7)';
    ctx.lineWidth = 1.5;
    ctx.beginPath();
    ctx.arc(mouse.x, mouse.y, 9, 0, 7);
    ctx.moveTo(mouse.x - 13, mouse.y); ctx.lineTo(mouse.x - 5, mouse.y);
    ctx.moveTo(mouse.x + 5, mouse.y); ctx.lineTo(mouse.x + 13, mouse.y);
    ctx.moveTo(mouse.x, mouse.y - 13); ctx.lineTo(mouse.x, mouse.y - 5);
    ctx.moveTo(mouse.x, mouse.y + 5); ctx.lineTo(mouse.x, mouse.y + 13);
    ctx.stroke();
  }
  drawTouchUI();
}

/* ---------- loop ---------- */
var lastT = 0, growlTimer = 2;
function frame(ts){
  requestAnimationFrame(frame);
  var dt = Math.min(0.05, (ts - lastT) / 1000 || 0);
  lastT = ts;
  if (!started) return;
  if (!paused && !S.over){
    simUpdate(S, dt, readInput());
    processEvents();
    growlTimer -= dt;
    if (growlTimer <= 0){
      growlTimer = 1.5 + Math.random() * 3;
      if (S.zombies.length > 0) sfx('growl');
    }
  }
  render(paused ? 0.0001 : dt);
}
requestAnimationFrame(frame);

/* ---------- overlays & buttons ---------- */
var titleOv = document.getElementById('titleOv');
var pauseOv = document.getElementById('pauseOv');
var overOv = document.getElementById('overOv');
var swapBtn = document.getElementById('swapBtn');

function startGame(){
  audioInit();
  S = createSim();
  particles = []; floats = []; marks = []; lights = []; decals = [];
  camX = clamp(S.player.x - W / 2, 0, Math.max(0, ARENA_W - W));
  camY = clamp(S.player.y - H / 2, 0, Math.max(0, ARENA_H - H));
  shake = 0; hurtFlash = 0;
  started = true; paused = false;
  titleOv.hidden = true; overOv.hidden = true; pauseOv.hidden = true;
  swapBtn.style.display = isTouch ? 'inline-block' : 'none';
}
function togglePause(){
  if (!started || S.over) return;
  paused = !paused;
  pauseOv.hidden = !paused;
  document.getElementById('pauseBtn').textContent = paused ? '▶' : '❚❚';
  if (AC && !paused && AC.state === 'suspended') AC.resume();
}
function onGameOver(){
  var prevBest = loadBest();
  var isNewBest = !prevBest || S.score > (prevBest.score || 0);
  saveBest();
  buzz(40);
  var acc = S.shots > 0 ? Math.round(S.hits / S.shots * 100) : 0;
  var wavesSurvived = Math.max(0, S.wave - (S.phase === 'wave' ? 1 : 0));
  var coins = clamp(Math.round(wavesSurvived * 6 + S.kills / 10), 1, 200);
  var rw = awardCoinsPlus('zombie-nights', coins);
  refreshTitleCoins();
  document.getElementById('stats').innerHTML =
    '<span>Waves survived</span><span>' + wavesSurvived + '</span>' +
    '<span>Kills</span><span>' + S.kills + '</span>' +
    '<span>Accuracy</span><span>' + acc + '%</span>' +
    '<span>Score</span><span id="ovScore">' + S.score.toLocaleString() + '</span>' +
    '<span>Coins</span><span id="ovCoins" style="color:#f5d76e">+' + rw.n + ' 🪙 (wallet ' + rw.total + ')</span>';
  document.getElementById('overBest').textContent = bestText();
  setTimeout(function(){
    overOv.hidden = false; rewardCeremony(rw);
    fxPop(overOv.querySelector('h2'), 1.5);
    fxCountUp(document.getElementById('ovScore'), '', S.score, '');
    fxPop(document.getElementById('ovCoins'), 1.2);
    if (isNewBest) fxPop(document.getElementById('overBest'), 1.2);
  }, 900);
}
function rewardCeremony(rw){
  try{
    var lk = document.getElementById('ovLucky'), tk = document.getElementById('ovTicket');
    lk.hidden = !(rw.lucky > 1);
    tk.hidden = !rw.ticket;
    if (rw.lucky > 1){
      lk.textContent = '🍀 LUCKY ×' + rw.lucky + '!';
      lk.style.animation = 'none'; void lk.offsetWidth; lk.style.animation = '';
      // rising arpeggio on the game's synth + haptic
      playTone(0.22, 0.14, 'triangle', 523, 523);
      setTimeout(function(){ playTone(0.22, 0.14, 'triangle', 659, 659); }, 100);
      setTimeout(function(){ playTone(0.22, 0.14, 'triangle', 784, 784); }, 200);
      setTimeout(function(){ playTone(0.24, 0.3, 'triangle', 1046, 1046); }, 300);
      buzz(30);
    }
  }catch(e){}
}

document.getElementById('playBtn').addEventListener('click', startGame);
document.getElementById('restartBtn').addEventListener('click', startGame);
document.getElementById('resumeBtn').addEventListener('click', togglePause);
document.getElementById('pauseBtn').addEventListener('click', function(){ togglePause(); });
document.getElementById('muteBtn').addEventListener('click', function(){
  muted = !muted;
  if (master) master.gain.value = muted ? 0 : 0.5;
  this.textContent = muted ? '🔇' : '🔊';
});
swapBtn.addEventListener('click', function(){ if (S && !S.over && !paused) cycleWeapon(S); });
swapBtn.addEventListener('touchstart', function(e){ e.stopPropagation(); }, { passive:true });

document.getElementById('titleBest').textContent = bestText();
refreshTitleCoins();
if ('ontouchstart' in window) { isTouch = true; }

})();
</script>
